503,44.810438],"coordsConfidence":"high","addressLat":"Keeni Hill, Unknown Heroes Street, near Tbilisi Sea, Tbilisi","weight":3,"status":"open","perspective":"both","fromPlan":false,"sources":[{"url":"https://ru.wikipedia.org/wiki/%D0%9B%D0%B5%D1%82%D0%BE%D0%BF%D0%B8%D1%81%D1%8C_%D0%93%D1%80%D1%83%D0%B7%D0%B8%D0%B8_(%D0%BC%D0%B5%D0%BC%D0%BE%D1%80%D0%B8%D0%B0%D0%BB%D1%8C%D0%BD%D1%8B%D0%B9_%D0%BA%D0%BE%D0%BC%D0%BF%D0%BB%D0%B5%D0%BA%D1%81)","checkedAt":"2026-06-09","confidence":"L"},{"url":"https://georgiantravelguide.com/en/monument-georgian-chronicle","checkedAt":"2026-06-09","confidence":"H"},{"url":"https://madloba.info/tbilisi/monuments-and-statues/the-chronicle-of-georgia/","checkedAt":"2026-06-09","confidence":"M"},{"url":"https://paperpaper.io/top-viewpoints-in-tbilisi-8-city-and-suburban-locations-with-mountain-views/","checkedAt":"2026-06-09","confidence":"M"},{"url":"https://georgiantravelguide.com/en/tbilisi-sea","checkedAt":"2026-06-09","confidence":"M"}]},{"id":"tbilisi-views-tv-tower-mtatsminda","name":"Тбилисская телебашня на Мтацминде","nameLat":"Tbilisi TV Tower","aliases":["Тбилисская телебашня на Мтацминде — «кибермаяк» силуэта","Tbilisi TV Tower","телевышка Мтацминда","трёхопорная башня","тренога Войны миров"],"location":"tbilisi","subLocation":"Мтацминда (Mtatsminda)","type":"рукотворная доминанта (небоскрёб/инженерное/монумент)","themes":["views","modernism","photo-spot"],"short":"Тбилисская телебашня на Мтацминде (275 м, 1972) — днём точечная доминанта-тренога на фоне неба, силуэт читается с Нарикалы и Сололакского хребта; ночью превращается в неоновый «кибермаяк» силуэта.","description":"Тбилисская телебашня (1972) на горе Мтацминда — 275 м, асимметричная трёхопорная конструкция; видна почти из любой точки города, ночью — многоцветная неоновая подсветка. Сама телебашня ЗАКРЫТА для публики: подняться или подойти к подножию нельзя, башню можно рассматривать только из Мтацминда-парка. Планы открыть смотровую площадку и ресторан/спа-отель с круговыми обзорными деками анонсировались (2020), но на 2023 работ не велось; на момент прогона публичной смотровой В башне нет. ВИД НА башню (как доминанту силуэта) при этом открыт отовсюду — это и есть смысл данной карточки. · Построена 1972 (заменила башню 1955 г.). 274.5 м на горе 719 м над уровнем моря. Видна почти отовсюду в городе. Подсветка в честь праздников. Внутрь башни доступа нет — это не Останкино; смотровой площадки публичной нет, ходить — на парк Мтацминда вокруг.","coords":[41.69583,44.78472],"coordsConfidence":"high","addressLat":"Mtatsminda plateau, Tbilisi","weight":2,"status":"open","perspective":"grassroots","fromPlan":false,"sources":[{"url":"https://ru.wikipedia.org/wiki/%D0%A2%D0%B1%D0%B8%D0%BB%D0%B8%D1%81%D1%81%D0%BA%D0%B0%D1%8F_%D1%82%D0%B5%D0%BB%D0%B5%D0%B1%D0%B0%D1%88%D0%BD%D1%8F","checkedAt":"2026-06-09","confidence":"L"},{"url":"https://madloba.info/tbilisi/architectural-landmarks/tbilisskaia-televyshka/","checkedAt":"2026-06-09","confidence":"M"},{"url":"https://en.wikipedia.org/wiki/Tbilisi_TV_Broadcasting_Tower","checkedAt":"2026-05-20","confidence":"H"}]},{"id":"tbilisi-views-bridge-of-peace-morse","name":"Мост Мира","nameLocal":"ქუჩის მუსიკოსები","nameLat":"Bridge of Peace","aliases":["Мост Мира — стеклянная волна с азбукой Морзе в подсветке","Bridge of Peace","Мост Мира","стеклянный мост","мост любви","Микеле де Лукки","Уличные музыканты Старого города (мост Мира / ул. Шардени / Сухой мост)","buskers Tbilisi","ქუჩის მუსიკოსები","уличные музыканты моста Мира","Shardeni street performers"],"location":"tbilisi","subLocation":"Старый Тбилиси / Рике (Old Tbilisi / Rike)","type":"фонтан/световое шоу/неоновый квартал","themes":["views","music"],"short":"Мост Мира — стеклянная волна де Лукки через Куру; LED включаются примерно за 90 минут до заката, и каждый час по подсветке бежит световой паттерн в коде Морзе (символы элементов человеческого тела, не «таблица Менделеева»). Вечерний кадр — мост + подсвеченная Нарикала + «трубы» Рике.","description":"Мост Мира (2010, арх. Микеле де Лукки) — пешеходный мост через Куру со стеклянно-стальным волнистым навесом; подсветка из тысяч LED включается за ~90 минут до сумерек. Подсветка моста каждый час азбукой Морзе передаёт символы химических элементов, входящих в тело человека (идея единства человечества). РАЗРЕШЕНО: подсветка Моста Мира кодом Морзе передаёт СИМВОЛЫ химических элементов периодической таблицы, ВХОДЯЩИХ В СОСТАВ ТЕЛА ЧЕЛОВЕКА (а не таблицу Менделеева целиком). Дизайнер света Philippe Martinaud трактует это как послание о 'жизни и мире между людьми': независимо от национальности/веры/облика все люди состоят из одной материи. Корректно говорить 'элементы тела человека азбукой Морзе', НЕ 'таблица Менделеева'. Англо-Wikipedia формулирует это же ('chemical elements from the periodic table that are found in the human body'), так что дисперсии источников снимаются: рус-тур-источники, пишущие 'таблица Менделеева', упрощают/искажают.. Технически: ~1208 кастомных LED-светильников на навесе; четыре световые программы сменяются каждый час; подсветка работает с −90 мин до заката и до +90 мин после восхода (т.е. всю ночь). Арх. Микеле Де Лукки (Италия), свет — Philippe Martinaud (Франция), открыт 2010. · На мосту Мира в любое время много людей, выступают уличные музыканты; на ул. Шардени вечером звучит живая музыка и выступают уличные артисты, создавая праздничную атмосферу.. Street performers и музыканты регулярно играют на ул. Шардени, особенно по выходным и в праздники; обычно не билетируемые impromptu-выступления.","coords":[41.693031,44.808286],"coordsConfidence":"high","addressLat":"over the Mtkvari/Kura, between Metekhi and Baratashvili bridges, linking Rike Park and Erekle II St, Tbilisi","weight":3,"status":"open","perspective":"both","fromPlan":false,"sources":[{"url":"https://abeonatravel.ge/istoriya-i-fakty/tbilisi/mosty-tbilisi/most-mira/","checkedAt":"2026-06-09","confidence":"M"},{"url":"https://eurasianet.org/the-glass-age-comes-to-georgia","checkedAt":"2026-06-09","confidence":"M"},{"url":"https://gruzia-tskaltubo.com/chto-posmotret-v-tbilisi/","checkedAt":"2026-06-12","confidence":"M"},{"url":"https://www.pelago.com/en/tbilisi/shardeni-street-c2218/","checkedAt":"2026-06-12","confidence":"M"}]},{"id":"tbilisi-views-rike-dancing-fountains","name":"Поющие/танцующие фонтаны Рике-парка","nameLat":"Dancing Fountains Rike","aliases":["Поющие/танцующие фонтаны Рике-парка (свето-музыкальное шоу)","Dancing Fountains Rike","поющие фонтаны Тбилиси","музыкальные фонтаны Рике","Поющие фонтаны парка Рике — свет и музыка на левом берегу Куры","Поющие фонтаны Рике — окно уточнено: тёплый сезон, вечер после темноты; ЗИМОЙ не работают (точное время старта не нашёл)","«Трубы» Рике (концертный зал Фуксаса) — заброшен, под угрозой сноса 2025","Rike concert hall","Rhike pipes","трубы Фуксаса","Music Theatre Exhibition Hall","Tbilisi tubes","Набережная левого берега (Рике → Метехи) — фронт старого города через Куру","Катер по Куре — старый город с воды (пирс у Метехи/Моста Мира)","Катер по Куре — расписание/пирсы подтверждены (11:00–22:00, каждые 20–25 мин, ~30 мин, от $12)","«Трубы» Рике (Фуксас) — статус на янв 2026: стоят, снос объявлен но не исполнен (обновление)","Rike Park music","поющие фонтаны Рике","Rike park fountains"],"location":"tbilisi","subLocation":"Рике / Авлабари (Rike / Avlabari), левый берег","type":"фонтан/световое шоу/неоновый квартал","themes":["views","music"],"short":"«Трубы» Рике (концертный зал Фуксаса) — две сопряжённые стеклянно-стальные трубы у Моста Мира, узнаваемый силуэт набережной и пара к работающим «грибам» того же бюро. После ухода Саакашвили финансирование иссякло, объект пустует; в мае 2025 мэр объявил намерение снести — судьба не решена.","description":"В Рике-парке работают танцующие фонтаны со светом и музыкой; лучше всего вечером после темноты, не функционируют зимой. Поющие фонтаны в парке Рике дают музыкально-световое шоу тёплыми вечерами (примерно с 20:00), вход бесплатный. Музыкально-световое шоу поющих фонтанов в Рике идёт в тёплый сезон вечерами после наступления темноты (бесплатно); зимой, по отзывам, фонтаны НЕ работают. Точное время старта в открытом web единого нет (ориентир — после заката). ОКНО уточнено: танцующие/поющие фонтаны Рике — свето-музыкальное шоу вечерами ПОСЛЕ ТЕМНОТЫ в тёплый сезон. Точное фиксированное время старта в открытом web НЕ публикуется (ориентир — после заката, лето ~с 20:00–21:00); ряд источников упоминает программу по пятницам с грузинской музыкой. Зимний негатив (фонтаны не работают зимой) — НЕ доказан строго: источники о 'летнем' окне есть, но прямого 'зимой выключены' независимого подтверждения 2 шт. нет → оставить как tentative-окно, не как факт-негатив. · Концертный зал и выставочный центр Фуксаса в Рике-парке (€40 млн, две стеклянно-стальные «трубы») построен при Саакашвили, никогда не открыт по назначению, пустует; в мае 2025 мэр Каладзе заявил о намерении снести. По состоянию на январь 2026 «трубы» Фуксаса в Рике-парке СТОЯТ (не снесены): Domus (08.01.2026) описывает их как существующий «памятник упущенной возможности Грузии». Снос пока только ОБЪЯВЛЕН мэром Каладзе (май 2025), без сроков и точных деталей будущего проекта; муниципалитет не назвал ни даты сноса, ни конкретного замещающего объекта (вероятно отель). Объект куплен с аукциона в 2020 бизнесменом Давидом Хидашели. · Парк Рике на левом берегу Куры: вид через реку на район Метехи и Мост Мира · Прогулочные катера по Куре отправляются от причала у Метехского моста и от пирса у Моста Мира (парк Рике), ежедневно 11:00–22:00, отправление каждые 20–25 мин, длительность ~30 мин. Маршрут проходит мимо Метехи, серных бань, Рике, Моста Мира — низкий ракурс с воды. Катера по Куре ходят ежедневно 11:00–22:00, отправление каждые 20–25 мин, длительность ~30 мин; пирсы у Метехского моста и у причала (jetty) снаружи Моста Мира (парк Рике); цена от ~$12/чел, точка сбора у части туров — ул. Коте Абхази 44 (несколько минут пешком до пирса). ПОДТВЕРЖДЕНО (fast-слой  контекстом)","themes":["views"],"short":"Каноничный вид с Нарикалы; берём с окном (закат/синий час) и low-crowd вариантом (утро / смещение по гребню).","description":"Со стен крепости Нарикала на Сололакском хребте открывается каноничная панорама старого города, Куры, бань Абанотубани и Самебы напротив. Работает на закат (запад ложится на старый город) и в синий час, когда включается подсветка; low-crowd вариант — раннее утро до прихода канатки или гребневая тропа справа (см. отдельный объект narikala-right-trail). Местные снимают не со стен, а сместившись по гребню — шире кадр, меньше людей. Реставрация Нарикалы (бюджет ~$5 млн, художественная подсветка) — основная часть работ завершалась к августу 2025. Пешеходный доступ к крепости и смотровой НЕ прерывался; на ~18 мес закрывалась автодорога. Панорамная смотровая у стен и канатка Рике-Нарикала работали в течение реставрации; малая церковь рядом доступна.","coords":[41.68778,44.80861],"coordsConfidence":"high","addressLat":"Narikala fortress, Old Tbilisi","weight":3,"status":"open","perspective":"both","fromPlan":false,"sources":[{"url":"https://wander-lush.org/best-views-in-tbilisi-photography/","checkedAt":"2026-06-09","confidence":"M"},{"url":"https://wander-lush.org/narikala-fortress-tbilisi-georgia/","checkedAt":"2026-06-09","confidence":"M"}]},{"id":"tbilisi-views-kartlis-deda-terrace","name":"Терраса у монумента Мать-Грузия","aliases":["Терраса у монумента Мать-Грузия (Картлис Деда) — панорама старого города"],"location":"tbilisi","subLocation":"Мтацминда","type":"культовый турвид (включён с контекстом)","themes":["views"],"short":"Терраса Мать-Грузии: панорама с угла иного, чем Нарикала (к Абанотубани/Куре); тихий закатный low-crowd вариант.","description":"Площадка у алюминиевого монумента Картлис Деда (Мать-Грузия, 1958, ≈20 м) на Сололакском хребте даёт панораму старого города с угла, отличного от Нарикалы — больше в сторону Абанотубани и Куры. Местные советуют именно этот, а не нарикальский угол: тише и кадр иначе ложится. Low-crowd окно — будний вечер на закате; точка доступна и после закрытия канатки пешком по гребню","coords":[41.688056,44.804583],"coordsConfidence":"high","addressLat":"Kartlis Deda (Mother of Georgia) monument, Sololaki ridge","weight":2,"status":"open","perspective":"both","fromPlan":false,"sources":[{"url":"https://aniolvisuals.com/tbilisi-photography-guide-spots/","checkedAt":"2026-06-09","confidence":"M"},{"url":"https://dron285.livejournal.com/92995.html","checkedAt":"2026-06-09","confidence":"M"}]},{"id":"tbilisi-views-tabori-plateau-propeway","name":"Плато Табори","aliases":["Плато Табори (монастырь Преображения) + канатка-проупэй — высшая природная панорама"],"location":"tbilisi","subLocation":"Крцаниси","type":"природная высота (холм/мыс/скала)","themes":["views"],"short":"Высшая природная панорама над городом с плато Табори; малолюдна из-за пешего подъёма от бань.","description":"Плато Табори (гора Табор, монастырь Преображения над серными банями) — одна из высших природных точек над Тбилиси; виден почти весь силуэт города, от Нарикалы до Самебы и хребтов. Подъём — по тропе из района бань Абанотубани (или серпантином); из-за пешего набора высоты точка малолюдна по сравнению с Нарикалой/Мтацминдой. Местные ценят Табори как 'смотровую без толп' и закатный угол на старый город. Плато Табори: новая канатная дорога Тбилиси, соединяющая пл. Свободы с горой Табори, заявлена к запуску в 2025 (анонс в обзоре «New in Georgia 2025»). По состоянию на прогон это ПЛАНИРУЕМЫЙ/строящийся проект, операционность по web не подтверждена; подъём на плато сейчас пеший (тропа от Абанотубани). Существующая верхняя станция «Tabori» фиксируется на картах. Не путать с уже перезапущенной (окт.2024) канаткой Руставели–Мтацминда.","coords":[41.6856507,44.8129624],"coordsConfidence":"medium","addressLat":"Tabor Monastery of the Transfiguration, Tabori plateau above Abanotubani","weight":3,"status":"open","perspective":"both","fromPlan":false,"sources":[{"url":"ht lisi-georgia/","checkedAt":"2026-06-09","confidence":"M"}]},{"id":"tbilisi-views-point-terrasse-rooftop","name":"Point Terrasse","aliases":["Point Terrasse (Vake/центр) — руфтоп-бар с высотной панорамой"],"location":"tbilisi","subLocation":"Исани","type":"крыша/высотка — условный доступ 🟡","themes":["views"],"short":"Руфтоп-бар Point Terrasse: высотная панорама центра/хребтов, закат→синий час, доступ через бар (🟡).","description":"Point Terrasse — руфтоп-бар на верхнем этаже с открытой панорамой города; вид на центр и хребты, азимут зависит от стороны террасы. Доступ 🟡 — через бар (заказ/депозит); лучшее окно — закат и переход в синий час","coords":[41.6923844,44.8044606],"coordsConfidence":"low","addressLat":"Anton Katalikosi St (~27/15), left-bank centre near Metekhi","weight":2,"status":"open","perspective":"grassroots","fromPlan":false,"sources":[{"url":"https://www.awaywithmaja.com/best-viewpoints-tbilisi-georgia/","checkedAt":"2026-06-09","confidence":"M"},{"url":"https://tbilisi-expat.com/blog/best-viewpoints-tbilisi","checkedAt":"2026-06-09","confidence":"M"}]},{"id":"tbilisi-views-sky7-mercure-rooftop","name":"SKY7 (руфтоп Mercure Old Town) — панорама старого города с высоты","aliases":[],"location":"tbilisi","subLocation":"Старый Тбилиси","type":"крыша/высотка — условный доступ 🟡","themes":["views"],"short":"Руфтоп SKY7 над Mercure Old Town: высотная панорама старого города, вечер/синий час, через бар (🟡).","description":"SKY7 — руфтоп-бар на верхнем этаже отеля Mercure Tbilisi Old Town; высотная панорама старого города, Куры и хребтов. Доступ 🟡 — через бар; окно — вечер/синий час, когда зажигается подсветка набережной и Нарикалы","coords":[41.6884998,44.8134391],"coordsConfidence":"medium","addressLat":"9 Vakhtang Gorgasali St, Mercure Tbilisi Old Town (SKY7 rooftop)","weight":2,"status":"open","perspective":"grassroots","fromPlan":false,"sources":[{"url":"https://tbilisi-expat.com/blog/best-viewpoints-tbilisi","checkedAt":"2026-06-09","confidence":"M"}]}  фабрики; кластер: студии, коворкинг, бары, хостел, арт-резиденция, галерея, street-gallery ART UP во дворе. Регулярно проводит выставки, кинопоказы, события и поп-ап маркеты. Бывшая советская швейная фабрика, превращённая в культурный хаб: кафе, бары, художественные студии, коворкинг, образовательные институции, мурали/стрит-арт.. Действует как культурный хаб Adjara Group: ART UP street gallery + Project Space; часть экосистемы Stamba/Rooms · Креативный хаб в бывшей советской швейной фабрике 'Нино' (ул. Эгнате Ниношвили 8, район Чугурети), открыт в июле 2016. Двор-площадка с барами/кафе принимает разовые события, концерты и вечеринки; работает как многофункциональный культурный центр. Former Soviet sewing factory turned multifunctional hostel/space; courtyard ringed by bars/cafés, open 24/7; informal hub of nightlife and DJ/live events. Муз-форматы во дворе Fabrika: разовые события, по пт/сб — лайв-музыка, DJ-сеты и тематические вечеринки; Record Store Day (винил-диллеры, DJ, поп-апы), опен-эйр кинопоказы на крыше. Это событийный двор-хаб (~дюжина баров/кафе вокруг), а не площадка с фиксированными резиденциями/сериями.","coords":[41.7094157,44.8028859],"coordsConfidence":"high","addressLat":"8 Egnate Ninoshvili St, Fabrika, Marjanishvili","weight":3,"status":"open","perspective":"both","fromPlan":false,"sources":[{"url":"https://sarafan.ge/threads/smotrovye-ploschadki-tbilisi-gde-naslazhdatsja-gorodom-dnjom-i-nochju-top-20-po-versii-madloba-i-vash-opyt.5950/","checkedAt":"2026-06-09","confidence":"M"},{"url":"https://www.awaywithmaja.com/best-viewpoints-tbilisi-georgia/","checkedAt":"2026-06-09","confidence":"M"},{"url":"https://madloba.info/en/tbilisi/street-art/art-up-street-gallery-fabrika-tbilisi/","checkedAt":"2026-06-01","confidence":"M"},{"url":"https://wander-lush.org/tbilisi-reclaimed-spaces-factories/","checkedAt":"2026-06-01","confidence":"M"},{"url":"https://eumiesawards.com/heritageobject/fabrika-tbilisi/","checkedAt":"2026-06-01","confidence":"M"},{"u "photo-spot"],"short":"Конференц-зал Союза журналистов с 16-рёберным куполом — стилизация под башню монастыря Ахпат X в. (арх. Мартин Товмасян, 1974). С 2022 — Hard Rock Cafe Yerevan.","description":"Бывшее здание Союза журналистов Армении, 1974. Архитектор Мартин Товмасян, инженер Рубен Бадалян. Пирамидальное здание конференц-зала в историческом центре на ул. Пушкина — одном из немногих уцелевших уголков старого Еревана. Шестнадцатигранный бетонный купол Товмасян проектировал, вдохновляясь колокольней монастыря Ахпат X в. (Лори). Уникальная индивидуально разработанная панельно-блочная конструкция: первые два этажа и конференц-зал в цоколе занимал Союз журналистов, фойе-пирамида служило входом в зал с естественным освещением. В 1978 скульптор Ара Арутюнян (автор «Матери-Армении») создал на стене здания декоративную скульптуру «Муза» — моделью была его жена Юлия Погосян. В 1970–80-х здесь шли дискуссии, конгрессы и выставки; во второй половине 1990-х в зале работал легендарный джаз-клуб Downtown. С середины 2000-х здание пустовало. С 29.07.2022 после серьёзной адаптации (две новые лестницы, фуд-лифты) — Hard Rock Cafe Yerevan: свыше 1000 м², концертный зал на 290 человек и магазин. Здание само — главное, кафе — повод подняться внутрь.","coords":[40.1800023,44.5160956],"coordsConfidence":"high","addressLat":"ул. Пушкина, центр Еревана","weight":2,"status":"open","fromPlan":false,"sources":[{"url":"https://urbanista.am/hard-rock-cafe-yerevan-eng","checkedAt":"2026-05-20","confidence":"H"},{"url":"https://en.armradio.am/2022/07/27/hard-rock-cafe-to-open-in-yerevan-soon/","checkedAt":"2026-05-20","confidence":"M"}]},{"id":"ev-polytechnic","name":"Национальный политехнический университет Армении (Полите́х)","nameLat":"National Polytechnic University of Armenia","aliases":[],"location":"yerevan","subLocation":"Кентрон","type":"modernism","themes":["modernism"],"short":"Учебный корпус 1975 г., арх. Армен Агалян. Поздний совмод с национальными мотивами.","description":"Откры ликишвили 30.","coords":[41.651,41.6395],"coordsConfidence":"medium","addressLat":"старт — Площадь Европы или ул. Memed Abashidze; маршрут 2 ч пешком","weight":2,"status":"open","fromPlan":false,"sources":[{"url":"https://georgia.travel/en/discover/old-batumi","checkedAt":"2026-05-21","confidence":"H"},{"url":"https://ru.netgazeti.ge","checkedAt":"2026-05-21","confidence":"M"}]},{"id":"bt-biniat-oglu","name":"Дом Лазаря Биниат-Оглы","nameLat":"Biniat-Ogly House","aliases":[],"location":"batumi","subLocation":"центр Батуми","type":"architecture","themes":["modernism","history","photo-spot"],"short":"Асимметричный модерн начала XX в. Дом табачного магната; в советское время — штаб дивизии и музей восковых фигур. На 2026 пустует и разрушается.","description":"Один из самых выразительных объектов батумского модерна: кирпич, дерево, железобетон, изящная изгородь, асимметричная композиция фасада. Построен в начале XX века для табачного магната Лазаря Биниат-Оглы. В советское время — штаб дивизии, потом дом архитекторов, потом музей восковых фигур. На 2026 здание пустое и постепенно разрушается — один из символов того, против чего воюют локальные градозащитники (общество «Батоми», Defend the Boulevard).","coords":[41.6493624,41.6403228],"coordsConfidence":"high","addressLat":"центр Батуми (точный адрес уточнить через общество «Батоми» / Шота Гуджабидзе)","weight":2,"status":"open","fromPlan":false,"sources":[{"url":"https://experience.tripster.ru/articles/burzhuaznyj-batumi/","checkedAt":"2026-05-21","confidence":"M"},{"url":"https://seasons-project.ru","checkedAt":"2026-05-21","confidence":"M"}]},{"id":"bt-sabashvili-house","name":"Дом Сабашвили (Дом Сабаева)","nameLat":"Sabashvili House","aliases":[],"location":"batumi","subLocation":"центр Батуми","type":"architecture","themes":["modernism","history","photo-spot"],"short":"Особняк начала XX в. с атлантами на фасаде работы скульптора Серафиме Пололикашвили. Сейчас — администрация правительства Аджарии.","description":"Один из главных модернистских особняков Батуми. Главная художественная деталь — атланты на фасаде работы скульптора Серафиме Пололикашвили. Сейчас в здании размещается администрация правительства Аджарии; внутрь пускают только официально. Снаружи объект работает как открытая городская скульптура. С ноября 2024 у здания регулярны акции протеста.","coords":[41.6517696,41.6373995],"coordsConfidence":"high","addressLat":"9 Konstantine Gamsakhurdia St, Batumi","weight":2,"status":"open","fromPlan":false,"sources":[{"url":"https://georgia.travel/en/discover/old-batumi","checkedAt":"2026-05-21","confidence":"M"},{"url":"https://ru.netgazeti.ge","checkedAt":"2026-05-21","confidence":"M"}]},{"id":"bt-apollo-cinema","name":"Кинотеатр «Аполло»","nameLat":"Apollo Cinema (Batumi)","aliases":[],"location":"batumi","subLocation":"центр Батуми","type":"architecture","themes":["modernism","history","cinema"],"short":"Первый кинотеатр Батуми. Эклектика с элементами модерна, фасад с медальонами. Рядом — Boni Bazaar.","description":"Первый кинотеатр Батуми, эклектика с элементами модерна. Здание сохранилось, работает как кинопоказательная площадка (нерегулярно — иногда BIAFF и камерные показы). Рядом — главный батумский рынок Boni Bazaar.","coords":[41.651436,41.6384516],"coordsConfidence":"high","addressLat":"36 Memed Abashidze St, Batumi","weight":2,"status":"open","fromPlan":false,"sources":[{"url":"https://georgia.travel/en/discover/old-batumi","checkedAt":"2026-05-21","confidence":"M"}]},{"id":"bt-intourist-palace","name":"Гостиница «Интурист» (Intourist Palace)","nameLat":"Intourist Palace Batumi","aliases":[],"location":"batumi","subLocation":"центр Батуми","type":"architecture","themes":["modernism","history"],"short":"Конструктивизм 1939 года архитектора Алексея Щусева — того же, что построил Мавзолей Ленина. На месте снесённой Александро-Невской церкви.","description":"Алексей Щусев (1873–1949) — один из главных архитекторов сталинского ампира и автор Мавзолея Ленина. Батумский . Главная драматическая сцена Аджарии.","description":"Леонид Теплицки — советский архитектор, работавший в Грузии в 1940–50-е. Здание Батумского драмтеатра 1952 года — сталинский ампир с грузинскими декоративными деталями. Главная драматическая сцена Аджарии, в репертуаре — классика и грузинские современные пьесы (язык — грузинский, иногда с переводом).","coords":[41.6528246,41.6383353],"coordsConfidence":"high","addressLat":"1 Shota Rustaveli St, Batumi","weight":2,"status":"open","fromPlan":false,"sources":[{"url":"https://georgia.travel/en/discover/old-batumi","checkedAt":"2026-05-21","confidence":"M"}]},{"id":"bt-octopus-cafe","name":"Octopus Café (мозаичный павильон)","nameLat":"Octopus Cafe","aliases":[],"location":"batumi","subLocation":"Бульвар","type":"architecture","themes":["modernism","photo-spot"],"short":"Мозаичный модернистский павильон 1975 года. Канон советского модернизма Батуми. Эксплуатация нестабильна.","description":"Октопус Café — мозаичный модернистский павильон 1975 года в форме осьминога, нарезной декор, морская тематика. Один из лучших образцов позднесоветского грузинского модернизма в Батуми. Здание уцелело, но эксплуатация нестабильна — иногда работает как кафе, иногда закрыто, иногда под угрозой сноса. Канон для любителей советского модернизма наряду с Морвокзалом и Music Center.","coords":[41.650074,41.625361],"coordsConfidence":"high","addressLat":"Бульвар Батуми (точное место уточнить через гид Kathmandu and Beyond или общество «Батоми»)","weight":2,"status":"open","fromPlan":false,"sources":[{"url":"https://kathmanduandbeyond.com","checkedAt":"2026-05-21","confidence":"M"}]},{"id":"bt-seaport-morvokzal","name":"Морвокзал Батуми (барельеф Посейдона)","nameLat":"Batumi Sea Port Terminal","aliases":[],"location":"batumi","subLocation":"порт Батуми","type":"architecture","themes":["modernism","history","photo-spot"],"short":"Здание Морвокзала советского времени с пастельным фризом: парусники, паромы и Посейдон в центре. Объект из батум         }).join('');
        const pay = payment && payment.length ? `<div class="meta">Оплата: ${payment.map(esc).join(', ')}</div>` : '';
        return `<dt>Цены</dt><dd><ul>${rows}</ul>${pay}</dd>`;
      }

      function howToBlock(p) {
        const parts = [];
        if (p.howToCarless) parts.push(`<li><strong>без машины:</strong> ${esc(p.howToCarless)}</li>`);
        if (p.howToCar) parts.push(`<li><strong>на машине:</strong> ${esc(p.howToCar)}</li>`);
        if (p.howToWalking) parts.push(`<li><strong>пешком:</strong> ${esc(p.howToWalking)}</li>`);
        if (!parts.length) return '';
        return `<dt>Как добраться</dt><dd><ul>${parts.join('')}</ul></dd>`;
      }

      function sourcesBlock(p) {
        if (!p.sources || !p.sources.length) return '';
        const items = p.sources.map(s => {
          const c = s.confidence ? `<span class="conf-${esc(s.confidence)}">[${esc(s.confidence)}]</span> ` : '';
          const url = safeUrl(s.url);
          const display = s.url.replace(/^https?:\/\//, '').replace(/\/$/, '');
          return `<li>${c}<a href="${url}" target="_blank" rel="noopener">${esc(display)}</a> · ${esc(s.checkedAt)}</li>`;
        }).join('');
        return `<div class="sources-block"><strong>Источники:</strong><ul>${items}</ul></div>`;
      }

      function specialBlock(p) {
        const out = [];
        if (p.swimming) {
          const s = p.swimming;
          const meta = [];
          if (s.body) meta.push(`<li>Тип воды: ${esc(s.body)}</li>`);
          if (s.waterTempJune) meta.push(`<li>Темп. воды в июне: ${esc(s.waterTempJune)}</li>`);
          if (s.entryType) meta.push(`<li>Вход: ${esc(s.entryType)}${s.entryFee ? ` (${esc(s.entryFee)})` : ''}</li>`);
          if (s.surface) meta.push(`<li>Покрытие: ${esc(s.surface)}</li>`);
          if (s.crowdsWeekend) meta.push(`<li>Толпы в выходные: ${esc(s.crowdsWeekend)}</li>`);
          if (s.amenities && s.amenities.length) meta.push(`<li>Удобства: ${s.amenities.map(esc).join(', ')}</li>`);
          if (s.bringWith && s.bringWith.length) meta.push(`<li>Взять с собой: ${s.bringWith.map(esc).join(', ')}</li>`);
          if (meta.length) out.push(`<dt>Купание</dt><dd><ul>${meta.join('')}</ul></dd>`);
        }
        if (p.winery) {
          const w = p.winery;
          const meta = [];
          if (w.format) meta.push(`<li>Формат: ${esc(w.format)}</li>`);
          if (w.durationMin) meta.push(`<li>Длительность: ${esc(w.durationMin)} мин</li>`);
          if (w.languages && w.languages.length) meta.push(`<li>Языки: ${w.languages.map(esc).join(', ')}</li>`);
          if (typeof w.tastingIncluded !== 'undefined') meta.push(`<li>Дегустация: ${w.tastingIncluded ? 'включена' : 'опц.'}</li>`);
          if (w.numWines) meta.push(`<li>Сортов на дегустации: ${esc(w.numWines)}</li>`);
          if (typeof w.bookingRequired !== 'undefined') meta.push(`<li>Бронь: ${w.bookingRequired ? 'обязательна' : 'не обязательна'}</li>`);
          if (w.carNeed) meta.push(`<li>Машина: ${esc(w.carNeed)}</li>`);
          if (w.alternative) meta.push(`<li>Альт.: ${esc(w.alternative)}</li>`);
          if (meta.length) out.push(`<dt>Винодельня</dt><dd><ul>${meta.join('')}</ul></dd>`);
        }
        if (p.club) {
          const c = p.club;
          const meta = [];
          if (c.capacity) meta.push(`<li>Вместимость: ${esc(c.capacity)}</li>`);
          if (c.doorPolicy) meta.push(`<li>Фейс-контроль: ${esc(c.doorPolicy)}</li>`);
          if (c.registrationUrl) meta.push(`<li>Регистрация: <a href="${safeUrl(c.registrationUrl)}" target="_blank" rel="noopener">${esc(c.registrationUrl)}</a></li>`);
          if (c.workDays) meta.push(`<li>Дни работы: ${esc(c.workDays)}</li>`);
          if (c.phonesPolicy) meta.push(`<li>Телефоны: ${esc(c.phonesPolicy)}</li>`);
          if (c.cover) meta.push(`<li>Вход: ${esc(c.cover)}</li>`);
          if (c.queerNight) meta.push(`<li>Queer night: ${esc(c.queerNight)}</li>`);
          if (meta.length) out.push(`<dt>Клуб</dt><dd><ul>${meta.join('')}</ul></dd>`);
        }
        return out.join('');
      }

      function renderPlace(p, dist) {
        const loc = locByKey[p.location];
        const locColor = loc ? loc.color : '#888';
        const themeLabels = (p.themes || [])
          .map(t => themeByKey[t])
          .filter(Boolean)
          .map(t => `<span class="meta">${esc(t.label)}</span>`)
          .join(' · ');

        const namesLine = p.name +
          (p.nameLocal ? ` <span class="nameLat">/ ${esc(p.nameLocal)}</span>` : '') +
          (p.nameLat ? ` <span class="nameLat">/ ${esc(p.nameLat)}</span>` : '');

        const trapBlock = (p.touristTrap && p.trapReason)
          ? `<div class="trap-reason">${esc(p.trapReason)}</div>` : '';
        const closedBlock = p.closedTemporarily
          ? `<div class="closed-note">${esc(p.closedNote || 'Закрыто на ремонт / уточнить локально')}</div>` : '';

        const dl = [];
        if (p.addressLoc) {
          dl.push(`<dt>Адрес (лок.)</dt><dd><span class="addr-text">${esc(p.addressLoc)}</span> <button type="button" class="copy-btn" data-copy="${esc(p.addressLoc)}" title="Копировать адрес">📋</button></dd>`);
        }
        if (p.addressLat) {
          dl.push(`<dt>Адрес (lat)</dt><dd><span class="addr-text">${esc(p.addressLat)}</span> <button type="button" class="copy-btn" data-copy="${esc(p.addressLat)}" title="Копировать адрес">📋</button></dd>`);
        }
        if (p.addressRu) {
          dl.push(`<dt>Адрес (ru)</dt><dd><span class="addr-text">${esc(p.addressRu)}</span> <button type="button" class="copy-btn" data-copy="${esc(p.addressRu)}" title="Копировать адрес">📋</button></dd>`);
        }
        // Открытие в картах — адрес, название, координаты рядом (адрес выше).
        const mapsGroup = addressLinks(p) + nameLinks(p) + coordsLinks(p);
        if (p.plusCode) dl.push(`<dt>Plus Code</dt><dd><code>${esc(p.plusCode)}</code></dd>`);
        if (p.tel) dl.push(`<dt>Телефон</dt><dd>${telLink(p.tel)}${p.tel2 ? ' · ' + telLink(p.tel2) : ''}</dd>`);
        if (p.email) dl.push(`<dt>Email</dt><dd><a href="mailto:${esc(p.email)}">${esc(p.email)}</a></dd>`);
        if (p.web) dl.push(`<dt>Сайт</dt><dd><a href="${safeUrl(p.web)}" target="_blank" rel="noopener">${esc(p.web)}</a></dd>`);
        if (p.social && p.social.length) {
          const items = p.social.map(socialLink).filter(Boolean).join(' ');
          if (items) dl.push(`<dt>Соцсети</dt><dd><div class="social-links">${items}</div></dd>`);
        }
        dl.push(hoursBlock(p.hours));
        if (p.seasonality) dl.push(`<dt>Сезон</dt><dd>${esc(p.seasonality)}</dd>`);
        if (p.bestTime) dl.push(`<dt>Когда лучше</dt><dd>${esc(p.bestTime)}</dd>`);
        if (p.avgVisit) dl.push(`<dt>Времени на посещение</dt><dd>${esc(p.avgVisit)}</dd>`);
        dl.push(pricesBlock(p.prices, p.payment));
        if (p.freeNote) dl.push(`<dt></dt><dd>${esc(p.freeNote)}</dd>`);
        dl.push(howToBlock(p));
        dl.push(specialBlock(p));
        if (p.bookingLeadTime) dl.push(`<dt>Бронь</dt><dd>${esc(p.bookingLeadTime)}</dd>`);

        const needsVerify = (p.needsLocalVerification && p.needsLocalVerification.length)
          ? `<p class="meta">Уточнить локально: ${p.needsLocalVerification.map(esc).join(', ')}</p>` : '';

        const insider = p.insider ? `<div class="insider">${esc(p.insider)}</div>` : '';
        const mistakes = p.commonMistakes ? `<p class="meta">Типичные ошибки: ${esc(p.commonMistakes)}</p>` : '';
        const nearbyLinks = (p.nearby || [])
          .map(id => {
            const np = placeById[id];
            return np ? `<a href="#place-${esc(id)}">${esc(np.name)}</a>` : '';
          })
          .filter(Boolean);
        const nearby = nearbyLinks.length
          ? `<p class="meta">Рядом: ${nearbyLinks.join(', ')}</p>` : '';

        // Медиа-слот: пустой пока, заполняется в Фазе 7
        const media = p.photo
          ? `<div class="media-slot"><img class="place-photo" src="${esc(p.photo)}" alt="${esc(p.name)}" loading="lazy"></div>`
          : '';

        // data-* для фильтров
        const dataAttrs = [
          `data-id="${esc(p.id)}"`,
          `data-location="${esc(p.location)}"`,
          `data-key="${p.weight === 3 ? 'true' : 'false'}"`,
          `data-exact="${p.coordsConfidence === 'high' ? 'true' : 'false'}"`,
          `data-open="${p.status === 'open' ? 'true' : 'false'}"`,
          `data-plan="${p.fromPlan ? 'true' : 'false'}"`,
          `data-hotel="${p.myHotel ? 'true' : 'false'}"`,
          `data-themes="${esc((p.themes || []).join(' '))}"`,
          `data-search="${esc([p.name, p.nameLat, p.nameLocal, (p.aliases || []).join(' '), p.short, p.description, p.addressLat, p.addressRu, p.subLocation, p.type].filter(Boolean).join(' ').toLowerCase())}"`,
        ].join(' ');

        // Мои отели: зелёная рамка через класс (без инлайн-цвета левой границы).
        const articleClass = 'place' + (p.myHotel ? ' place-hotel' : '');
        const styleAttr = p.myHotel ? '' : ` style="border-left-color:${esc(locColor)}"`;
        return `
          <article class="${articleClass}" id="place-${esc(p.id)}" ${dataAttrs}${styleAttr}>
            <div class="place-head">
              <h3>${namesLine}</h3>
              ${dist != null ? `<span class="place-dist" title="Расстояние по прямой от точки отсчёта">📍 ${esc(formatDist(dist))}</span>` : ''}
            </div>
            <div class="place-type">${p.subLocation ? esc(p.subLocation) + ' · ' : ''}${esc(p.type)}${themeLabels ? ' · ' + themeLabels : ''}</div>
            <div class="badges">${buildBadges(p)}</div>
            <div class="place-short">${esc(p.short)}</div>
            ${trapBlock}
            ${closedBlock}
            ${media}
            ${routeAddButton(p)}
            <details class="place-details">
              <summary>Подробнее</summary>
              <div class="place-body">
                ${p.description ? `<p>${esc(p.description)}</p>` : ''}
                ${coordsBlock(p)}
                ${mapsGroup}
                <dl class="kv">${dl.filter(Boolean).join('')}</dl>
                ${insider}
                ${mistakes}
                ${nearby}
                ${needsVerify}
                ${sourcesBlock(p)}
              </div>
            </details>
          </article>
        `;
      }

      // -------------------------------------------------------------------
      // Catalog: рендер групп по локации, фильтры
      // -------------------------------------------------------------------

      function renderCatalog() {
        const list = $('#catalog-list');
        const totalEl = $('#catalog-total');

        // Режим «по удалённости»: единый плоский список, отсортированный по
        // расстоянию по прямой от якорной точки. Локации НЕ группируем —
        // ближайшее всплывает первым (а т.к. города географически разнесены,
        // тот город, где вы стоите, естественно оказывается сверху).
        if (state.anchor) {
          const a = [state.anchor.lat, state.anchor.lng];
          const ranked = PLACES
            .filter(p => p.coords)
            .map(p => ({ p, d: haversine(a, p.coords) }))
            .sort((x, y) => x.d - y.d);
          list.innerHTML = `
            <div class="places-group" data-sorted-by-distance="true">
              <h3 class="group-title">📍 По удалённости — от ${esc(state.anchor.label)} <span class="meta">· ${ranked.length}</span></h3>
              ${ranked.map(({ p, d }) => renderPlace(p, d)).join('')}
            </div>`;
          totalEl.textContent = PLACES.length;
          return;
        }

        // Группируем по локациям в порядке LOCATIONS
        const html = [];
        LOCATIONS.forEach(loc => {
          const places = PLACES.filter(p => p.location === loc.key);
          if (!places.length) return;
          // priority-1 первыми, потом по mustSee, потом по name
          places.sort((a, b) => {
            if (a.priority !== b.priority) return a.priority - b.priority;
            if (!!b.mustSee !== !!a.mustSee) return b.mustSee ? 1 : -1;
            return a.name.localeCompare(b.name, 'ru');
          });
          html.push(`
            <div class="places-group" data-location-group="${esc(loc.key)}">
              <h3 class="group-title" id="catalog-${esc(loc.key)}" style="border-bottom-color:${esc(loc.color)}">${esc(loc.label)} <span class="meta">· ${places.length}</span></h3>
              ${places.map(renderPlace).join('')}
            </div>
          `);
        });
        list.innerHTML = html.join('');
        totalEl.textContent = PLACES.length;
      }

      // -------------------------------------------------------------------
      // Filters
      // -------------------------------------------------------------------

      const state = {
        locations: new Set(),    // если пусто — все
        themes: new Set(),       // если пусто — все
        key: false,              // узловое (weight === 3)
        exact: false,            // точные координаты (confidence high)
        open: false,             // открыто сейчас
        plan: false,             // из оригинального плана
        hotel: false,            // мои отели
        search: '',
        anchor: null,            // {lat, lng, label} — если задано, каталог сортируется по удалённости
      };

      // Парсит строку «широта, долгота» → [lat, lng] | null. Допускает запятую,
      // точку с запятой или пробел как разделитель; проверяет диапазоны.
      function parseCoords(s) {
        if (!s) return null;
        const m = String(s).trim().match(/^(-?\d+(?:\.\d+)?)\s*[,;\s]\s*(-?\d+(?:\.\d+)?)$/);
        if (!m) return null;
        const lat = parseFloat(m[1]), lng = parseFloat(m[2]);
        if (!(lat >= -90 && lat <= 90 && lng >= -180 && lng <= 180)) return null;
        return [lat, lng];
      }

      function buildFilterChips() {
        // Локации
        const locRow = $('.filter-row[data-group="location"]');
        LOCATIONS.forEach(l => {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'chip';
          btn.dataset.location = l.key;
          btn.style.borderColor = l.color;
          btn.innerHTML = `${esc(l.label)}`;
          btn.addEventListener('click', () => {
            if (state.locations.has(l.key)) state.locations.delete(l.key);
            else state.locations.add(l.key);
            btn.classList.toggle('active');
            applyFilters();
          });
          locRow.appendChild(btn);
        });

        // Темы — выбираем популярные, иначе ряд раздуется до 23 элементов
        const themeUsage = {};
        PLACES.forEach(p => (p.themes || []).forEach(t => { themeUsage[t] = (themeUsage[t] || 0) + 1; }));
        const popular = THEMES
          .filter(t => themeUsage[t.key])
          .sort((a, b) => (themeUsage[b.key] || 0) - (themeUsage[a.key] || 0));
        const themeRow = $('.filter-row[data-group="theme"]');
        popular.forEach(t => {
          const btn = document.createElement('button');
          btn.type = 'button';
          btn.className = 'chip';
          btn.dataset.theme = t.key;
          btn.innerHTML = `${esc(t.label)} <span class="meta">${themeUsage[t.key]}</span>`;
          btn.addEventListener('click', () => {
            if (state.themes.has(t.key)) state.themes.delete(t.key);
            else state.themes.add(t.key);
            btn.classList.toggle('active');
            applyFilters();
          });
          themeRow.appendChild(btn);
        });

        // Флаги — простые независимые тумблеры
        $$('.chip[data-flag]').forEach(btn => {
          btn.addEventListener('click', () => {
            const key = btn.dataset.flag;
            state[key] = !state[key];
            btn.classList.toggle('active');
            applyFilters();
          });
        });

        $('#filter-reset').addEventListener('click', () => {
          state.locations.clear();
          state.themes.clear();
          state.key = false;
          state.exact = false;
          state.open = false;
          state.plan = false;
          state.hotel = false;
          $$('.chip.active').forEach(b => b.classList.remove('active'));
          if (state.anchor) {
            // Сброс якоря перерисовывает каталог (плоский → сгруппированный)
            // и сам зовёт applyFilters() — отдельный вызов ниже не нужен.
            setAnchor(null);
          } else {
            applyFilters();
          }
        });

        // Сворачиваемые фильтры на мобильном (на >=980px CSS их всё равно держит открытыми).
        const filters = $('#filters');
        const toggle = $('#filters-toggle');
        if (toggle) {
          toggle.addEventListener('click', () => {
            const open = filters.dataset.open !== 'true';
            filters.dataset.open = open ? 'true' : 'false';
            toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
          });
        }
      }

      // ---- Якорь сортировки по удалённости ------------------------------

      // Синхронизирует чип-индикатор активного якоря с состоянием.
      function updateAnchorChip() {
        const chip = $('#anchor-clear');
        if (!chip) return;
        chip.hidden = !state.anchor;
        const lbl = $('#anchor-label');
        if (lbl) lbl.textContent = state.anchor ? state.anchor.label : '';
      }

      // Устанавливает (или снимает, при null) якорь и перерисовывает каталог:
      // плоский список по удалённости ↔ группировка по локациям. Сохраняет
      // активные фильтры (applyFilters прогоняется по свежим карточкам).
      function setAnchor(anchor) {
        state.anchor = anchor || null;
        updateAnchorChip();
        renderCatalog();
        refreshAddButtons();
        applyFilters();
        if (anchor) {
          const cat = document.getElementById('catalog');
          if (cat) cat.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      }

      // Геолокация браузера → колбэки. btn (опц.) блокируется на время запроса.
      function locateMe(onOk, onErr, btn) {
        if (!navigator.geolocation) { onErr('Браузер не поддерживает геолокацию.'); return; }
        let orig;
        if (btn) { orig = btn.textContent; btn.disabled = true; btn.textContent = '📍 …'; }
        const restore = () => { if (btn) { btn.disabled = false; btn.textContent = orig; } };
        navigator.geolocation.getCurrentPosition(
          pos => { restore(); onOk([pos.coords.latitude, pos.coords.longitude]); },
          err => { restore(); onErr('Не удалось определить местоположение: ' + (err && err.message || 'отказано')); },
          { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
        );
      }

      // Диалог ручного ввода якоря: координаты «широта, долгота» либо кнопка
      // «моё местоположение», которая подставляет их в поле.
      function promptAnchor() {
        openModal({
          title: 'Сортировать по удалённости',
          body: 'Точка отсчёта: координаты в формате «широта, долгота» — или возьмите текущее местоположение.',
          fields: [{
            key: 'coords', label: 'Координаты', placeholder: '40.17763, 44.51261', inputmode: 'decimal',
            button: '📍 моё местоположение',
            onButton: ({ setValue, setError, button }) => {
              setError('');
              locateMe(
                c => setValue(c[0].toFixed(5) + ', ' + c[1].toFixed(5)),
                msg => setError(msg),
                button
              );
            },
          }],
          confirmLabel: 'Сортировать',
          validate: v => parseCoords(v.coords) ? null : 'Введите координаты в формате «широта, долгота».',
        }).then(v => {
          if (!v) return;
          const c = parseCoords(v.coords);
          if (c) setAnchor({ lat: c[0], lng: c[1], label: 'указанной точки' });
        });
      }

      function setupAnchor() {
        const geo = $('#anchor-geo');
        if (geo) {
          geo.addEventListener('click', () => {
            locateMe(
              c => setAnchor({ lat: c[0], lng: c[1], label: 'моего местоположения' }),
              msg => modalAlert('Геолокация', msg),
              geo
            );
          });
        }
        const pick = $('#anchor-pick');
        if (pick) pick.addEventListener('click', promptAnchor);

        const clear = $('#anchor-clear');
        if (clear) clear.addEventListener('click', () => setAnchor(null));

        // «📍 отсюда» на карточке — сортировать каталог от этой точки.
        document.addEventListener('click', e => {
          const btn = e.target.closest('[data-anchor-from]');
          if (!btn) return;
          const p = placeById[btn.getAttribute('data-anchor-from')];
          if (p && p.coords) setAnchor({ lat: p.coords[0], lng: p.coords[1], label: p.name });
        });

        updateAnchorChip();
      }

      function countActiveFilters() {
        let n = state.locations.size + state.themes.size;
        ['key', 'exact', 'open', 'plan', 'hotel'].forEach(k => {
          if (state[k]) n++;
        });
        if (state.anchor) n++;
        if (state.search && state.search.trim()) n++;
        return n;
      }

      function updateFiltersCount() {
        const n = countActiveFilters();
        const badge = $('#filters-count');
        if (!badge) return;
        if (n > 0) {
          badge.textContent = n;
          badge.hidden = false;
        } else {
          badge.hidden = true;
        }
      }

      function applyFilters() {
        const search = state.search.trim().toLowerCase();
        let shown = 0, hidden = 0;
        $$('.place').forEach(el => {
          const data = el.dataset;
          let ok = true;

          if (state.locations.size && !state.locations.has(data.location)) ok = false;
          if (ok && state.themes.size) {
            const themes = (data.themes || '').split(' ');
            let anyTheme = false;
            state.themes.forEach(t => { if (themes.includes(t)) anyTheme = true; });
            if (!anyTheme) ok = false;
          }
          if (ok && state.key && data.key !== 'true') ok = false;
          if (ok && state.exact && data.exact !== 'true') ok = false;
          if (ok && state.open && data.open !== 'true') ok = false;
          if (ok && state.plan && data.plan !== 'true') ok = false;
          if (ok && state.hotel && data.hotel !== 'true') ok = false;
          if (ok && search && !(data.search || '').includes(search)) ok = false;

          if (ok) { el.classList.remove('hidden'); shown++; }
          else { el.classList.add('hidden'); hidden++; }
        });

        // Скрыть группы локации, в которых не осталось видимых точек
        $$('.places-group').forEach(g => {
          const visible = $$('.place:not(.hidden)', g).length;
          g.style.display = visible ? '' : 'none';
          const title = $('.group-title', g);
          if (title) {
            const totalInGroup = $$('.place', g).length;
            const meta = $('.meta', title);
            if (meta) meta.textContent = '· ' + (visible === totalInGroup ? visible : (visible + ' из ' + totalInGroup));
          }
        });

        const status = $('#filter-status');
        if (status) {
          if (shown === PLACES.length) status.textContent = `Показаны все ${PLACES.length} точек`;
          else status.textContent = `Показано ${shown} из ${PLACES.length}`;
        }
        updateFiltersCount();
      }

      // -------------------------------------------------------------------
      // Search + nav + UX
      // -------------------------------------------------------------------

      function setupSearch() {
        const input = $('#search');
        const clear = $('#search-clear');
        let debounceId;
        input.addEventListener('input', () => {
          clear.hidden = !input.value;
          clearTimeout(debounceId);
          debounceId = setTimeout(() => {
            state.search = input.value;
            applyFilters();
            // Прокрутить к каталогу, если что-то ввели
            if (input.value.trim()) {
              const cat = document.getElementById('catalog');
              if (cat) cat.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
          }, 120);
        });
        clear.addEventListener('click', () => {
          input.value = '';
          state.search = '';
          clear.hidden = true;
          applyFilters();
          input.focus();
        });
      }

      function setupCopyButtons() {
        document.addEventListener('click', e => {
          const btn = e.target.closest('[data-copy]');
          if (!btn) return;
          const text = btn.dataset.copy;
          const done = () => {
            btn.classList.add('copied');
            const orig = btn.textContent;
            btn.textContent = '✓';
            setTimeout(() => {
              btn.classList.remove('copied');
              btn.textContent = orig;
            }, 1500);
          };
          if (navigator.clipboard && navigator.clipboard.writeText) {
            navigator.clipboard.writeText(text).then(done, () => fallbackCopy(text, done));
          } else {
            fallbackCopy(text, done);
          }
        });
      }
      function fallbackCopy(text, done) {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        try { document.execCommand('copy'); done(); }
        catch (_) { /* noop */ }
        finally { document.body.removeChild(ta); }
      }

      // ===================================================================
      // Модалка: внутристраничная замена prompt/confirm/alert.
      // Тематизирована (CSS-переменные) → идёт за темой во всех браузерах.
      //   openModal(opts) -> Promise.
      //     с полями (opts.fields): resolve({key: value}) | null при отмене;
      //     без полей: resolve(true) при подтверждении | false при отмене.
      //   opts: {title, body, fields:[{key,label,value,placeholder,inputmode,
      //          multiline,rows}], confirmLabel, cancelLabel (null = без отмены,
      //          alert), danger, validate(values) -> errString|null}
      // ===================================================================
      let modalEl = null;
      let modalPrevFocus = null;

      function openModal(opts) {
        const o = opts || {};
        const fields = o.fields || [];
        const hasFields = fields.length > 0;
        const cancelable = o.cancelLabel !== null;

        if (!modalEl) {
          modalEl = document.createElement('div');
          modalEl.className = 'modal-backdrop';
          modalEl.hidden = true;
          modalEl.setAttribute('role', 'dialog');
          modalEl.setAttribute('aria-modal', 'true');
          document.body.appendChild(modalEl);
        }
        const back = modalEl;

        return new Promise(resolve => {
          const fieldsHtml = fields.map((f, i) => {
            const id = 'modal-f-' + i;
            const tag = f.multiline ? 'textarea' : 'input';
            const attrs = f.multiline
              ? `rows="${f.rows || 2}"`
              : `type="text" inputmode="${esc(f.inputmode || 'text')}"`;
            const inputHtml = `<${tag} id="${id}" class="modal-input" ${attrs} placeholder="${esc(f.placeholder || '')}"></${tag}>`;
            // Опц. кнопка-действие у поля (напр. «текущие координаты»).
            const btnHtml = f.button
              ? `<button type="button" class="modal-field-btn" data-fieldbtn="${i}">${esc(f.button)}</button>`
              : '';
            const control = btnHtml
              ? `<div class="modal-field-row">${inputHtml}${btnHtml}</div>`
              : inputHtml;
            return `
              <div class="modal-field">
                ${f.label ? `<label for="${id}">${esc(f.label)}</label>` : ''}
                ${control}
              </div>`;
          }).join('');

          back.innerHTML = `
            <div class="modal" aria-labelledby="modal-title">
              ${o.title ? `<h2 class="modal-title" id="modal-title">${esc(o.title)}</h2>` : ''}
              ${o.body ? `<p class="modal-body">${esc(o.body)}</p>` : ''}
              ${fieldsHtml}
              <p class="modal-error" id="modal-error" hidden></p>
              <div class="modal-actions">
                ${cancelable ? `<button type="button" class="modal-btn" data-modal="cancel">${esc(o.cancelLabel || 'Отмена')}</button>` : ''}
                <button type="button" class="modal-btn ${o.danger ? 'modal-btn-danger' : 'modal-btn-primary'}" data-modal="ok">${esc(o.confirmLabel || 'OK')}</button>
              </div>
            </div>`;

          // значения проставляем через DOM (не через innerHTML — безопасно и для textarea)
          fields.forEach((f, i) => {
            const el = back.querySelector('#modal-f-' + i);
            if (el) el.value = f.value || '';
          });

          const errEl = back.querySelector('#modal-error');

          // Кнопки-действия у полей: отдаём обработчику доступ к полю и строке ошибки.
          fields.forEach((f, i) => {
            if (!f.onButton) return;
            const btn = back.querySelector('[data-fieldbtn="' + i + '"]');
            const input = back.querySelector('#modal-f-' + i);
            if (!btn || !input) return;
            btn.addEventListener('click', () => {
              f.onButton({
                button: btn,
                input: input,
                setValue: v => { input.value = v == null ? '' : String(v); },
                setError: msg => {
                  if (!errEl) return;
                  errEl.textContent = msg || '';
                  errEl.hidden = !msg;
                },
              });
            });
          });

          modalPrevFocus = document.activeElement;
          back.hidden = false;
          requestAnimationFrame(() => back.classList.add('show'));

          function collect() {
            const out = {};
            fields.forEach((f, i) => {
              const el = back.querySelector('#modal-f-' + i);
              out[f.key] = el ? el.value : '';
            });
            return out;
          }

          let closed = false;
          function close(result) {
            if (closed) return;
            closed = true;
            back.classList.remove('show');
            document.removeEventListener('keydown', onKey, true);
            back.removeEventListener('click', onClick);
            setTimeout(() => { back.hidden = true; back.innerHTML = ''; }, 160);
            if (modalPrevFocus && modalPrevFocus.focus) {
              try { modalPrevFocus.focus(); } catch (e) {}
            }
            resolve(result);
          }

          function confirm() {
            if (hasFields) {
              const values = collect();
              if (o.validate) {
                const err = o.validate(values);
                if (err) { errEl.textContent = err; errEl.hidden = false; return; }
              }
              close(values);
            } else {
              close(true);
            }
          }
          function cancel() { close(hasFields ? null : false); }

          function onClick(e) {
            const t = e.target.closest('[data-modal]');
            if (t) {
              if (t.getAttribute('data-modal') === 'ok') confirm(); else cancel();
              return;
            }
            if (e.target === back && cancelable) cancel(); // клик по фону
          }
          function onKey(e) {
            if (e.key === 'Escape' && cancelable) { e.preventDefault(); cancel(); }
            else if (e.key === 'Enter') {
              const inTextarea = e.target && e.target.tagName === 'TEXTAREA';
              if (inTextarea && !(e.ctrlKey || e.metaKey)) return; // в textarea — перенос строки
              e.preventDefault();
              confirm();
            }
          }

          back.addEventListener('click', onClick);
          document.addEventListener('keydown', onKey, true);

          const firstField = back.querySelector('.modal-input');
          if (firstField) { firstField.focus(); if (firstField.select) firstField.select(); }
          else { const ok = back.querySelector('[data-modal="ok"]'); if (ok) ok.focus(); }
        });
      }

      // Обёртка alert: одна кнопка, без отмены.
      function modalAlert(title, body) {
        return openModal({ title: title, body: body, cancelLabel: null, confirmLabel: 'OK' });
      }

      // ===================================================================
      // Фаза 5: планировщик маршрутов
      // ===================================================================
      // Оверлей поверх гайда: набор точек из каталога в именованные списки,
      // дистанции по прямой, экспорт в KML / Google Maps. Состояние —
      // в localStorage под одним ключом. Карту не рисуем (см. ТЗ).

      // ---- Справочник точек по id ----
      const placeById = {};
      PLACES.forEach(p => { placeById[p.id] = p; });

      // ---- Геометрия ----------------------------------------------------

      // Расстояние по прямой между [lat,lon] и [lat,lon], в метрах. R = 6371 км.
      function haversine(a, b) {
        const R = 6371000;
        const toRad = d => d * Math.PI / 180;
        const dLat = toRad(b[0] - a[0]);
        const dLon = toRad(b[1] - a[1]);
        const lat1 = toRad(a[0]);
        const lat2 = toRad(b[0]);
        const h = Math.sin(dLat / 2) * Math.sin(dLat / 2) +
                  Math.cos(lat1) * Math.cos(lat2) *
                  Math.sin(dLon / 2) * Math.sin(dLon / 2);
        return 2 * R * Math.asin(Math.sqrt(h));
      }

      function formatDist(m) {
        if (m < 1000) return Math.round(m) + ' м';
        return (m / 1000).toFixed(1) + ' км';
      }

      // Сумма дистанций по прямой вдоль заданного порядка точек.
      function totalDistance(places) {
        let sum = 0;
        for (let i = 1; i < places.length; i++) {
          sum += haversine(places[i - 1].coords, places[i].coords);
        }
        return sum;
      }

      // Nearest neighbour от первой точки. Возвращает новый массив точек.
      function nnSort(places) {
        if (places.length < 3) return places.slice();
        const rest = places.slice(1);
        const ordered = [places[0]];
        let current = places[0];
        while (rest.length) {
          let bestIdx = 0;
          let bestD = Infinity;
          for (let i = 0; i < rest.length; i++) {
            const d = haversine(current.coords, rest[i].coords);
            if (d < bestD) { bestD = d; bestIdx = i; }
          }
          current = rest.splice(bestIdx, 1)[0];
          ordered.push(current);
        }
        return ordered;
      }

      // ---- Компас-виджет ------------------------------------------------
      // Маленький SVG на карточке точки: направление и расстояние от центра
      // города. Рисуется только для трёх городов; для регионов и точек без
      // координат compassWidget возвращает пустую строку.

      const CITY_CENTERS = {
        yerevan: [40.1776, 44.5126], // площадь Республики
        tbilisi: [41.6934, 44.8015], // площадь Свободы
        batumi:  [41.6511, 41.6369], // площадь Европы, статуя Медеи
      };

      // Азимут от точки a [lat,lon] к точке b [lat,lon], в радианах.
      // 0 = север, по часовой стрелке (восток = π/2, юг = π, запад = −π/2).
      function azimuth(a, b) {
        const toRad = d => d * Math.PI / 180;
        const lat1 = toRad(a[0]);
        const lat2 = toRad(b[0]);
        const dLon = toRad(b[1] - a[1]);
        const y = Math.sin(dLon) * Math.cos(lat2);
        const x = Math.cos(lat1) * Math.sin(lat2) -
                  Math.sin(lat1) * Math.cos(lat2) * Math.cos(dLon);
        return Math.atan2(y, x);
      }

      // SVG-компас для карточки. Чистая функция: place -> строка <svg> или ''.
      // viewBox 36×36, центр (18,18), круг радиусом 12. Хвост за кругом
      // ограничен 4.5 (а не 12 из ТЗ): при центре 18 и радиусе круга 12 до
      // края viewBox остаётся 6, минус радиус маркера-точки — иначе SVG
      // вышел бы за свои границы и налезал на соседние элементы карточки.
      function compassWidget(place) {
        if (!place || !place.coords) return '';
        const center = CITY_CENTERS[place.location];
        if (!center) return '';

        const C = 18;          // центр viewBox
        const R = 12;          // радиус «городской зоны» в SVG-единицах
        const ZONE_KM = 5;     // радиус городской зоны в км
        const MAX_TAIL = 4.5;  // макс. длина хвоста за кругом
        const TAIL_SCALE = 0.75;

        const km = haversine(center, place.coords) / 1000; // haversine отдаёт метры
        const ang = azimuth(center, place.coords);
        const ux = Math.sin(ang);   // SVG: x = sin(угол)
        const uy = -Math.cos(ang);  // SVG: y = −cos(угол), ось y растёт вниз

        let innerLen, tailLen;
        if (km <= ZONE_KM) {
          innerLen = (km / ZONE_KM) * R;  // линейно: чем дальше — тем ближе к краю
          tailLen = 0;
        } else {
          innerLen = R;                   // линия упёрлась в границу круга
          tailLen = Math.min(MAX_TAIL, Math.log(km - ZONE_KM + 1) * TAIL_SCALE);
        }

        const r2 = n => n.toFixed(2);
        const ix = C + ux * innerLen, iy = C + uy * innerLen;

        const svg = [
          `<circle class="compass-circle" cx="${C}" cy="${C}" r="${R}"/>`,
          `<circle class="compass-hub" cx="${C}" cy="${C}" r="1.25"/>`,
          `<line class="compass-line" x1="${C}" y1="${C}" x2="${r2(ix)}" y2="${r2(iy)}"/>`,
        ];

        if (tailLen > 0) {
          const tx = ix + ux * tailLen, ty = iy + uy * tailLen;
          svg.push(`<line class="compass-tail" x1="${r2(ix)}" y1="${r2(iy)}" x2="${r2(tx)}" y2="${r2(ty)}"/>`);
          // Пунктирная альтернатива хвоста — заменить строкой выше для сравнения:
          // svg.push(`<line class="compass-tail" stroke-dasharray="2 1.5" x1="${r2(ix)}" y1="${r2(iy)}" x2="${r2(tx)}" y2="${r2(ty)}"/>`);
        }

        return `<svg class="compass" viewBox="0 0 36 36" width="36" height="36" aria-hidden="true">${svg.join('')}</svg>`;
      }

      // ---- Утилиты ------------------------------------------------------

      // Транслитерация для безопасного имени файла.
      const TRANSLIT = {
        'а': 'a', 'б': 'b', 'в': 'v', 'г': 'g', 'д': 'd', 'е': 'e', 'ё': 'e',
        'ж': 'zh', 'з': 'z', 'и': 'i', 'й': 'y', 'к': 'k', 'л': 'l', 'м': 'm',
        'н': 'n', 'о': 'o', 'п': 'p', 'р': 'r', 'с': 's', 'т': 't', 'у': 'u',
        'ф': 'f', 'х': 'h', 'ц': 'ts', 'ч': 'ch', 'ш': 'sh', 'щ': 'sch',
        'ъ': '', 'ы': 'y', 'ь': '', 'э': 'e', 'ю': 'yu', 'я': 'ya',
      };
      function slugify(s) {
        const lower = String(s || '').toLowerCase();
        let out = '';
        for (const ch of lower) {
          if (Object.prototype.hasOwnProperty.call(TRANSLIT, ch)) out += TRANSLIT[ch];
          else if (/[a-z0-9]/.test(ch)) out += ch;
          else out += '-';
        }
        out = out.replace(/-+/g, '-').replace(/^-|-$/g, '');
        return out || 'marshrut';
      }

      // Множественное число: forms = [одна, две, пять].
      function plural(n, forms) {
        const n10 = n % 10;
        const n100 = n % 100;
        if (n10 === 1 && n100 !== 11) return forms[0];
        if (n10 >= 2 && n10 <= 4 && (n100 < 10 || n100 >= 20)) return forms[1];
        return forms[2];
      }

      // Метка времени списка: ДД.ММ ЧЧ:ММ.
      function formatStamp(ms) {
        const d = new Date(ms);
        const p2 = n => (n < 10 ? '0' : '') + n;
        return p2(d.getDate()) + '.' + p2(d.getMonth() + 1) +
               ' ' + p2(d.getHours()) + ':' + p2(d.getMinutes());
      }

      // Скачивание строки как файла через Blob.
      function downloadFile(filename, content, mime) {
        const blob = new Blob([content], { type: mime || 'text/plain;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        setTimeout(() => URL.revokeObjectURL(url), 2000);
      }

      // ---- Экспорт ------------------------------------------------------

      // KML для Google My Maps. ВНИМАНИЕ: в KML координаты — lon,lat,alt.
      function buildKML(list) {
        const places = list.placeIds
          .map(id => placeById[id])
          .filter(p => p && p.coords);
        const out = [];
        out.push('<?xml version="1.0" encoding="UTF-8"?>');
        out.push('<kml xmlns="http://www.opengis.net/kml/2.2"><Document>');
        out.push('<name>' + esc(list.name) + '</name>');
        places.forEach((p, i) => {
          const lat = p.coords[0];
          const lon = p.coords[1];
          out.push(
            '<Placemark>' +
            '<name>' + esc((i + 1) + '. ' + p.name) + '</name>' +
            '<description>' + esc(p.short || '') + '</description>' +
            '<Point><coordinates>' + lon + ',' + lat + ',0</coordinates></Point>' +
            '</Placemark>'
          );
        });
        if (places.length > 1) {
          const line = places.map(p => p.coords[1] + ',' + p.coords[0] + ',0').join(' ');
          out.push(
            '<Placemark><name>Маршрут</name>' +
            '<LineString><tessellate>1</tessellate>' +
            '<coordinates>' + line + '</coordinates></LineString></Placemark>'
          );
        }
        out.push('</Document></kml>');
        return out.join('\n');
      }

      // Ссылка «проложить маршрут» в Google Maps. Только 2–9 точек.
      function googleMapsUrl(places) {
        if (places.length < 2 || places.length > 9) return '';
        const ll = p => p.coords[0] + ',' + p.coords[1];
        const mid = places.slice(1, -1).map(ll);
        let url = 'https://www.google.com/maps/dir/?api=1' +
          '&origin=' + encodeURIComponent(ll(places[0])) +
          '&destination=' + encodeURIComponent(ll(places[places.length - 1]));
        if (mid.length) url += '&waypoints=' + encodeURIComponent(mid.join('|'));
        url += '&travelmode=walking';
        return url;
      }

      // ---- RouteStore: состояние в localStorage -------------------------

      const RouteStore = (function () {
        const KEY = 'guide-route-data';
        const VERSION = 1;
        let data = null;

        function blank() { return { version: VERSION, activeListId: null, lists: [], customPlaces: {} }; }

        function genId() {
          return 'lst-' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
        }

        // Валидирует «свою точку» (координаты + описание) до формы Place.
        function validCustom(p) {
          if (!p || typeof p !== 'object') return null;
          const id = (typeof p.id === 'string' && p.id) ? p.id : null;
          const c = p.coords;
          if (!id || !Array.isArray(c) || c.length !== 2 ||
              typeof c[0] !== 'number' || typeof c[1] !== 'number' ||
              Math.abs(c[0]) > 90 || Math.abs(c[1]) > 180) return null;
          const name = (typeof p.name === 'string' && p.name.trim()) ? p.name.trim() : 'Своя точка';
          return {
            id: id,
            name: name,
            short: (typeof p.short === 'string' && p.short.trim()) ? p.short.trim() : name,
            type: 'своя точка',
            subLocation: 'своя точка',
            location: 'custom',
            coords: [c[0], c[1]],
            coordsConfidence: 'high',
            custom: true,
          };
        }

        // Чистка списка: только валидные id точек с координатами.
        function normalizeList(l) {
          if (!l || typeof l !== 'object') return null;
          const now = Date.now();
          const raw = Array.isArray(l.placeIds) ? l.placeIds : [];
          const seen = {};
          const placeIds = [];
          raw.forEach(id => {
            if (typeof id === 'string' && !seen[id] &&
                placeById[id] && placeById[id].coords) {
              seen[id] = true;
              placeIds.push(id);
            }
          });
          return {
            id: (typeof l.id === 'string' && l.id) ? l.id : genId(),
            name: (typeof l.name === 'string' && l.name.trim()) ? l.name.trim() : 'Маршрут',
            placeIds: placeIds,
            createdAt: (typeof l.createdAt === 'number') ? l.createdAt : now,
            updatedAt: (typeof l.updatedAt === 'number') ? l.updatedAt : now,
          };
        }

        function normalizeData(raw) {
          if (!raw || typeof raw !== 'object' || !Array.isArray(raw.lists)) return null;
          // Свои точки регистрируем в placeById ДО нормализации списков — иначе
          // normalizeList выкинет их id как «неизвестные точки без координат».
          const customPlaces = {};
          if (raw.customPlaces && typeof raw.customPlaces === 'object') {
            Object.keys(raw.customPlaces).forEach(k => {
              const v = validCustom(raw.customPlaces[k]);
              if (v) { customPlaces[v.id] = v; placeById[v.id] = v; }
            });
          }
          const lists = raw.lists.map(normalizeList).filter(Boolean);
          const seen = {};
          lists.forEach(l => {
            while (seen[l.id]) l.id = genId();
            seen[l.id] = true;
          });
          let activeListId = (typeof raw.activeListId === 'string') ? raw.activeListId : null;
          if (!lists.some(l => l.id === activeListId)) {
            activeListId = lists.length ? lists[0].id : null;
          }
          return { version: VERSION, activeListId: activeListId, lists: lists, customPlaces: customPlaces };
        }

        function load() {
          try {
            const raw = localStorage.getItem(KEY);
            if (!raw) { data = blank(); return; }
            data = normalizeData(JSON.parse(raw)) || blank();
          } catch (e) {
            data = blank();
          }
        }

        function ensure() { if (!data) load(); return data; }

        function persist() {
          ensure();
          try { localStorage.setItem(KEY, JSON.stringify(data)); }
          catch (e) { console.warn('Route data save failed:', e); }
        }

        function listsByRecent() {
          // Свежие сверху. При равном updatedAt — позже добавленный список выше
          // (детерминированный тай-брейк по порядку в data.lists).
          return ensure().lists
            .map((l, i) => ({ l: l, i: i }))
            .sort((a, b) => (b.l.updatedAt - a.l.updatedAt) || (b.i - a.i))
            .map(x => x.l);
        }

        function getList(id) {
          ensure();
          return data.lists.filter(l => l.id === id)[0] || null;
        }

        function activeList() {
          ensure();
          return getList(data.activeListId);
        }

        // Возвращает активный список, создавая «Мой маршрут», если списков нет.
        function ensureActive() {
          ensure();
          let l = activeList();
          if (!l) {
            l = normalizeList({ name: 'Мой маршрут', placeIds: [] });
            data.lists.push(l);
            data.activeListId = l.id;
            persist();
          }
          return l;
        }

        function isActive(placeId) {
          const l = activeList();
          return !!l && l.placeIds.indexOf(placeId) !== -1;
        }

        // Добавляет/убирает точку в активном списке. true => теперь в списке.
        function togglePlace(placeId) {
          const l = ensureActive();
          const i = l.placeIds.indexOf(placeId);
          if (i === -1) l.placeIds.push(placeId);
          else l.placeIds.splice(i, 1);
          l.updatedAt = Date.now();
          persist();
          return i === -1;
        }

        function removeFromActive(placeId) {
          const l = activeList();
          if (!l) return -1;
          const i = l.placeIds.indexOf(placeId);
          if (i !== -1) {
            l.placeIds.splice(i, 1);
            l.updatedAt = Date.now();
            persist();
          }
          return i;
        }

        function insertIntoActive(placeId, index) {
          const l = activeList();
          if (!l || l.placeIds.indexOf(placeId) !== -1) return;
          const i = Math.max(0, Math.min(index, l.placeIds.length));
          l.placeIds.splice(i, 0, placeId);
          l.updatedAt = Date.now();
          persist();
        }

        function setActiveOrder(placeIds) {
          const l = activeList();
          if (!l) return;
          l.placeIds = placeIds.slice();
          l.updatedAt = Date.now();
          persist();
        }

        function setActive(id) {
          ensure();
          if (getList(id)) { data.activeListId = id; persist(); }
        }

        function createList(name) {
          ensure();
          const l = normalizeList({ name: name, placeIds: [] });
          data.lists.push(l);
          data.activeListId = l.id;
          persist();
          return l.id;
        }

        function renameList(id, name) {
          const l = getList(id);
          if (!l) return;
          l.name = (name && name.trim()) || l.name;
          l.updatedAt = Date.now();
          persist();
        }

        function duplicateList(id) {
          const src = getList(id);
          if (!src) return null;
          const copy = normalizeList({
            name: src.name + ' (копия)',
            placeIds: src.placeIds.slice(),
          });
          data.lists.push(copy);
          data.activeListId = copy.id;
          persist();
          return copy.id;
        }

        function deleteList(id) {
          ensure();
          data.lists = data.lists.filter(l => l.id !== id);
          if (data.activeListId === id) {
            data.activeListId = data.lists.length ? listsByRecent()[0].id : null;
          }
          persist();
        }

        // Добавляет свою точку (координаты + описание). Возвращает id или null.
        function addCustomPlace(p) {
          ensure();
          const v = validCustom(p);
          if (!v) return null;
          if (!data.customPlaces) data.customPlaces = {};
          data.customPlaces[v.id] = v;
          placeById[v.id] = v;
          persist();
          return v.id;
        }

        function getData() { return ensure(); }

        function replaceAll(raw) {
          data = normalizeData(raw) || blank();
          persist();
        }

        function mergeImport(raw) {
          ensure();
          const incoming = normalizeData(raw);
          if (!incoming) return;
          const seen = {};
          data.lists.forEach(l => { seen[l.id] = true; });
          incoming.lists.forEach(l => {
            while (seen[l.id]) l.id = genId();
            seen[l.id] = true;
            data.lists.push(l);
          });
          if (incoming.customPlaces) {
            if (!data.customPlaces) data.customPlaces = {};
            Object.keys(incoming.customPlaces).forEach(k => {
              data.customPlaces[k] = incoming.customPlaces[k];
              placeById[k] = incoming.customPlaces[k];
            });
          }
          persist();
        }

        load();

        return {
          lists: listsByRecent,
          getList: getList,
          activeList: activeList,
          ensureActive: ensureActive,
          isActive: isActive,
          togglePlace: togglePlace,
          removeFromActive: removeFromActive,
          insertIntoActive: insertIntoActive,
          setActiveOrder: setActiveOrder,
          setActive: setActive,
          createList: createList,
          addCustomPlace: addCustomPlace,
          renameList: renameList,
          duplicateList: duplicateList,
          deleteList: deleteList,
          getData: getData,
          replaceAll: replaceAll,
          mergeImport: mergeImport,
          normalizeImport: normalizeData,
        };
      })();

      // ---- Состояние UI планировщика ------------------------------------

      let listsPanelOpen = false;   // открыта ли панель списков в оверлее
      let importPending = null;     // нормализованные данные, ждущие merge/replace
      let toastTimer = null;
      let toastUndo = null;         // колбэк текущего undo-тоста

      // ---- Кнопка «В маршрут» на карточке точки -------------------------

      function routeAddButton(p) {
        if (!p.coords) {
          return '<div class="place-actions">' +
            '<button type="button" class="route-add-btn route-add-disabled" disabled ' +
            'title="нет точных координат — в маршрут добавить нельзя">' +
            'нет координат</button></div>';
        }
        const inList = RouteStore.isActive(p.id);
        return '<div class="place-actions">' +
          '<button type="button" class="route-add-btn' + (inList ? ' added' : '') + '" ' +
          'data-route-add="' + esc(p.id) + '">' +
          (inList ? 'В маршруте' : 'В маршрут') + '</button>' +
          '<button type="button" class="anchor-from-btn" data-anchor-from="' + esc(p.id) + '" ' +
          'title="Сортировать каталог по удалённости от этой точки">📍 отсюда</button>' +
          compassWidget(p) + '</div>';
      }

      // Приводит все кнопки «В маршрут» к состоянию активного списка.
      function refreshAddButtons() {
        $$('[data-route-add]').forEach(btn => {
          const inList = RouteStore.isActive(btn.getAttribute('data-route-add'));
          btn.classList.toggle('added', inList);
          btn.textContent = inList ? 'В маршруте' : 'В маршрут';
        });
      }

      // Счётчик точек активного маршрута — чип на кнопке «Маршрут» в топбаре.
      function updateRouteCount() {
        const l = RouteStore.activeList();
