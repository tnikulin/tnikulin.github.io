        const n = l ? l.placeIds.length : 0;
        const badge = $('#route-top-count');
        if (!badge) return;
        badge.textContent = n;
        badge.hidden = n === 0;
      }

      // Единая синхронизация UI после любой мутации данных.
      function refreshAll() {
        updateRouteCount();
        refreshAddButtons();
        if (isOverlayOpen()) renderRouteScreen();
      }

      // ---- Undo-тост ----------------------------------------------------

      function showToast(msg, undoFn) {
        const t = $('#route-toast');
        if (!t) return;
        $('#route-toast-msg').textContent = msg;
        toastUndo = undoFn || null;
        t.hidden = false;
        void t.offsetWidth; // reflow, чтобы сработал transition
        t.classList.add('show');
        clearTimeout(toastTimer);
        toastTimer = setTimeout(hideToast, 5000);
      }

      function hideToast() {
        const t = $('#route-toast');
        if (!t) return;
        clearTimeout(toastTimer);
        t.classList.remove('show');
        toastUndo = null;
        setTimeout(() => { if (!t.classList.contains('show')) t.hidden = true; }, 220);
      }

      // ---- Рендер экрана маршрута ---------------------------------------

      function renderRouteScreen() {
        const scroll = $('#route-scroll');
        if (!scroll) return;
        const active = RouteStore.activeList();

        if (!active) {
          scroll.innerHTML =
            '<div class="route-empty">' +
              '<p>Списков маршрутов пока нет.</p>' +
              '<p class="route-empty-hint">Добавьте точку кнопкой «В маршрут» ' +
              'в каталоге — список создастся сам. Или создайте вручную.</p>' +
            '</div>' +
            '<div class="route-actions">' +
              '<button type="button" class="route-btn route-btn-primary" ' +
              'data-route-action="create-list">＋ Создать список</button>' +
              '<button type="button" class="route-btn" ' +
              'data-route-action="add-custom">Своя точка</button>' +
              '<button type="button" class="route-btn" ' +
              'data-route-action="import-json">Импорт из JSON</button>' +
            '</div>';
          return;
        }

        const allLists = RouteStore.lists();
        const html = [];

        // Бар активного списка + переключатель.
        html.push(
          '<div class="route-listbar">' +
            '<div class="route-listbar-name">' + esc(active.name) +
              ' <span class="route-listbar-sub">· ' + active.placeIds.length + '</span>' +
            '</div>' +
            '<button type="button" class="route-lists-toggle" data-route-action="toggle-lists">' +
              (listsPanelOpen ? '▴ Списки' : '▾ Списки · ' + allLists.length) +
            '</button>' +
          '</div>'
        );

        if (listsPanelOpen) html.push(renderListsPanel(allLists, active));
        if (importPending) html.push(renderImportChoice());

        // Упорядоченный список точек с дистанциями.
        const places = active.placeIds.map(id => placeById[id]).filter(p => p && p.coords);
        if (!places.length) {
          html.push(
            '<div class="route-empty">' +
              '<p>Список пуст.</p>' +
              '<p class="route-empty-hint">Откройте каталог и добавляйте точки ' +
              'кнопкой «В маршрут», или добавьте свою точку по координатам.</p>' +
              '<div class="route-actions">' +
                '<button type="button" class="route-btn route-btn-primary" ' +
                'data-route-action="add-custom">Своя точка</button>' +
              '</div>' +
            '</div>'
          );
        } else {
          html.push('<div class="route-list" id="route-list">');
          places.forEach((p, i) => {
            if (i > 0) {
              const d = haversine(places[i - 1].coords, p.coords);
              html.push('<div class="route-dist">' + esc(formatDist(d)) + '</div>');
            }
            const loc = locByKey[p.location];
            const district = p.subLocation || (loc ? loc.label : p.location);
            // У своих точек нет карточки в каталоге — имя не ссылка.
            const nameHtml = p.custom
              ? '<span class="route-row-name">' + esc(p.name) + '</span>'
              : '<a class="route-row-name" href="#place-' + esc(p.id) + '" draggable="false">' + esc(p.name) + '</a>';
            html.push(
              '<div class="route-row" data-place-id="' + esc(p.id) + '" draggable="true">' +
                '<div class="route-row-delzone" aria-hidden="true">Удалить</div>' +
                '<div class="route-row-surface">' +
                  '<span class="route-handle" aria-hidden="true">⠿</span>' +
                  '<span class="route-num">' + (i + 1) + '</span>' +
                  '<div class="route-row-text">' +
                    nameHtml +
                    '<span class="route-row-meta">' + esc(p.type) +
                      ' · ' + esc(district) + '</span>' +
                  '</div>' +
                  '<button type="button" class="route-row-copy" ' +
                  'data-copy="' + esc(p.coords[0] + ', ' + p.coords[1]) + '" ' +
                  'title="Копировать координаты" aria-label="Копировать координаты">📋</button>' +
                  '<button type="button" class="route-row-del" ' +
                  'data-route-del="' + esc(p.id) + '" ' +
                  'aria-label="Удалить из маршрута">×</button>' +
                '</div>' +
              '</div>'
            );
          });
          html.push('</div>');

          const total = totalDistance(places);
          html.push(
            '<div class="route-totals" id="route-totals">Итого: ' + places.length + ' ' +
            plural(places.length, ['точка', 'точки', 'точек']) + ' · ' +
            esc(formatDist(total)) + ' по прямой</div>'
          );
        }

        // Действия.
        const acts = [];
        acts.push(
          '<button type="button" class="route-btn" data-route-action="add-custom">' +
          'Своя точка</button>'
        );
        acts.push(
          '<button type="button" class="route-btn" data-route-action="autosort"' +
          (places.length < 3 ? ' disabled' : '') +
          '>Упорядочить автоматически</button>'
        );
        acts.push(
          '<button type="button" class="route-btn route-btn-primary" ' +
          'data-route-action="kml"' + (places.length < 1 ? ' disabled' : '') +
          '>Скачать KML</button>'
        );
        if (places.length >= 2 && places.length <= 9) {
          acts.push(
            '<button type="button" class="route-btn" data-route-action="gmaps">' +
            'Открыть в Google Maps</button>'
          );
        }
        html.push('<div class="route-actions">' + acts.join('') + '</div>');

        // Страховка данных.
        html.push(
          '<details class="route-backup">' +
            '<summary>Резервная копия списков</summary>' +
            '<div class="route-actions">' +
              '<button type="button" class="route-btn" data-route-action="export-json">' +
              'Экспорт всех списков в JSON</button>' +
              '<button type="button" class="route-btn" data-route-action="import-json">' +
              'Импорт из JSON</button>' +
            '</div>' +
          '</details>'
        );

        scroll.innerHTML = html.join('');
      }

      function renderListsPanel(lists, active) {
        const rows = lists.map(l => {
          const isActive = l.id === active.id;
          return '<div class="route-listitem' + (isActive ? ' is-active' : '') + '">' +
            '<button type="button" class="route-listitem-pick" ' +
            'data-route-select="' + esc(l.id) + '">' +
              '<span class="route-listitem-name">' + (isActive ? '● ' : '○ ') +
                esc(l.name) + '</span>' +
              '<span class="route-listitem-meta">' + l.placeIds.length + ' ' +
                plural(l.placeIds.length, ['точка', 'точки', 'точек']) +
                ' · ' + esc(formatStamp(l.updatedAt)) + '</span>' +
            '</button>' +
            '<div class="route-listitem-acts">' +
              '<button type="button" class="route-icon-btn" ' +
              'data-route-rename="' + esc(l.id) + '" title="Переименовать" ' +
              'aria-label="Переименовать список">✎</button>' +
              '<button type="button" class="route-icon-btn" ' +
              'data-route-dup="' + esc(l.id) + '" title="Дублировать" ' +
              'aria-label="Дублировать список">⧉</button>' +
              '<button type="button" class="route-icon-btn route-icon-danger" ' +
              'data-route-delete-list="' + esc(l.id) + '" title="Удалить" ' +
              'aria-label="Удалить список">🗑</button>' +
            '</div>' +
          '</div>';
        }).join('');
        return '<div class="route-lists-panel">' + rows +
          '<button type="button" class="route-btn" data-route-action="create-list">' +
          '＋ Новый список</button>' +
        '</div>';
      }

      function renderImportChoice() {
        const n = importPending.lists.length;
        return '<div class="route-import-choice">' +
          '<p>В файле ' + n + ' ' + plural(n, ['список', 'списка', 'списков']) +
          '. У вас уже есть сохранённые списки — что сделать?</p>' +
          '<div class="route-actions">' +
            '<button type="button" class="route-btn route-btn-primary" ' +
            'data-route-action="import-merge">Объединить (добавить новые)</button>' +
            '<button type="button" class="route-btn" ' +
            'data-route-action="import-replace">Заменить всё импортом</button>' +
            '<button type="button" class="route-btn" ' +
            'data-route-action="import-cancel">Отмена</button>' +
          '</div>' +
        '</div>';
      }

      // ---- Действия экрана маршрута -------------------------------------

      function deletePlaceFromActive(placeId) {
        const active = RouteStore.activeList();
        if (!active) return;
        const index = active.placeIds.indexOf(placeId);
        if (index === -1) return;
        RouteStore.removeFromActive(placeId);
        refreshAll();
        showToast('Точка удалена из маршрута', () => {
          RouteStore.insertIntoActive(placeId, index);
          refreshAll();
        });
      }

      async function doCreateList() {
        const res = await openModal({
          title: 'Новый список',
          fields: [{ key: 'name', label: 'Название', value: 'Новый список', placeholder: 'Напр. День 1 — центр' }],
          confirmLabel: 'Создать',
          validate: v => v.name.trim() ? null : 'Введите название списка.',
        });
        if (!res) return;
        RouteStore.createList(res.name.trim());
        listsPanelOpen = false;
        refreshAll();
      }

      // Добавление своей точки: координаты + описание одной формой.
      function parseCoords(raw) {
        const nums = (String(raw || '').match(/-?\d+(?:[.,]\d+)?/g) || [])
          .map(s => Number(s.replace(',', '.')));
        if (nums.length < 2 || Math.abs(nums[0]) > 90 || Math.abs(nums[1]) > 180) return null;
        return [nums[0], nums[1]];
      }

      // Подставляет текущие координаты из браузера в поле «координаты».
      // Браузер сам спросит разрешение; требуется защищённый контекст (https/localhost).
      function fillCurrentLocation(api) {
        if (!navigator.geolocation) {
          api.setError('Геолокация не поддерживается этим браузером.');
          return;
        }
        const btn = api.button;
        const orig = btn.textContent;
        btn.disabled = true;
        btn.textContent = '…';
        api.setError('');
        navigator.geolocation.getCurrentPosition(
          pos => {
            btn.disabled = false;
            btn.textContent = orig;
            const lat = pos.coords.latitude;
            const lon = pos.coords.longitude;
            api.setValue(lat.toFixed(6) + ', ' + lon.toFixed(6));
            api.input.focus();
          },
          err => {
            btn.disabled = false;
            btn.textContent = orig;
            let msg = 'Не удалось определить местоположение.';
            if (err && err.code === 1) msg = 'Доступ к геолокации запрещён — разрешите его в настройках браузера и повторите.';
            else if (err && err.code === 2) msg = 'Местоположение недоступно. Проверьте GPS / интернет.';
            else if (err && err.code === 3) msg = 'Истекло время ожидания. Попробуйте ещё раз.';
            api.setError(msg);
          },
          { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
        );
      }

      async function doAddCustom() {
        const res = await openModal({
          title: 'Своя точка',
          body: 'Вставьте координаты из Google / Яндекс Карт или нажмите «📍 Я здесь», чтобы взять текущие из браузера.',
          fields: [
            { key: 'coords', label: 'Координаты (широта, долгота)', placeholder: '40.1812, 44.5145', inputmode: 'decimal', button: '📍 Я здесь', onButton: fillCurrentLocation },
            { key: 'name', label: 'Название / описание', value: 'Своя точка' },
          ],
          confirmLabel: 'Добавить',
          validate: v => parseCoords(v.coords)
            ? null
            : 'Нужны два числа: широта (−90…90), долгота (−180…180). Напр.: 40.1812, 44.5145',
        });
        if (!res) return;
        const coords = parseCoords(res.coords);
        const name = res.name.trim() || 'Своя точка';
        const id = 'cust-' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6);
        const newId = RouteStore.addCustomPlace({ id: id, name: name, short: name, coords: coords });
        if (!newId) { await modalAlert('Ошибка', 'Не удалось создать точку.'); return; }
        RouteStore.togglePlace(newId); // добавляет в активный список (создаёт его при нужде)
        refreshAll();
        showToast('Своя точка добавлена в маршрут', () => {
          RouteStore.removeFromActive(newId);
          refreshAll();
        });
      }

      async function doRenameList(id) {
        const list = RouteStore.getList(id);
        if (!list) return;
        const res = await openModal({
          title: 'Переименовать список',
          fields: [{ key: 'name', label: 'Название', value: list.name }],
          confirmLabel: 'Сохранить',
          validate: v => v.name.trim() ? null : 'Введите название.',
        });
        if (!res) return;
        RouteStore.renameList(id, res.name.trim());
        refreshAll();
      }

      async function doDeleteList(id) {
        const list = RouteStore.getList(id);
        if (!list) return;
        const ok = await openModal({
          title: 'Удалить список?',
          body: 'Список «' + list.name + '» и все точки внутри будут удалены. Действие необратимо.',
          confirmLabel: 'Удалить',
          cancelLabel: 'Отмена',
          danger: true,
        });
        if (!ok) return;
        RouteStore.deleteList(id);
        refreshAll();
      }

      function doAutosort() {
        const active = RouteStore.activeList();
        if (!active) return;
        const places = active.placeIds.map(id => placeById[id]).filter(p => p && p.coords);
        if (places.length < 3) return;
        RouteStore.setActiveOrder(nnSort(places).map(p => p.id));
        refreshAll();
      }

      function doDownloadKML() {
        const active = RouteStore.activeList();
        if (!active || !active.placeIds.length) return;
        downloadFile('route-' + slugify(active.name) + '.kml', buildKML(active),
          'application/vnd.google-earth.kml+xml');
      }

      function doOpenGmaps() {
        const active = RouteStore.activeList();
        if (!active) return;
        const places = active.placeIds.map(id => placeById[id]).filter(p => p && p.coords);
        const url = googleMapsUrl(places);
        if (url) window.open(url, '_blank', 'noopener');
      }

      function doExportJSON() {
        const json = JSON.stringify(RouteStore.getData(), null, 2);
        downloadFile('travel-routes-' + BUILD_DATE + '.json', json, 'application/json');
      }

      function onImportFile(e) {
        const file = e.target.files && e.target.files[0];
        e.target.value = ''; // позволяет выбрать тот же файл повторно
        if (!file) return;
        const reader = new FileReader();
        reader.onload = () => {
          let parsed;
          try { parsed = JSON.parse(reader.result); }
          catch (err) { modalAlert('Ошибка импорта', 'Не удалось прочитать файл: это не JSON.'); return; }
          const norm = RouteStore.normalizeImport(parsed);
          if (!norm || !norm.lists.length) {
            modalAlert('Ошибка импорта', 'В файле нет списков маршрутов.');
            return;
          }
          if (RouteStore.lists().length === 0) {
            RouteStore.replaceAll(norm);
            importPending = null;
            if (location.hash !== '#route') location.hash = 'route';
            else refreshAll();
          } else {
            importPending = norm;
            if (location.hash !== '#route') location.hash = 'route';
            else renderRouteScreen();
          }
        };
        reader.readAsText(file);
      }

      function doImport(mode) {
        if (!importPending) return;
        if (mode === 'replace') RouteStore.replaceAll(importPending);
        else RouteStore.mergeImport(importPending);
        importPending = null;
        listsPanelOpen = false;
        refreshAll();
      }

      function onRouteAction(action) {
        switch (action) {
          case 'toggle-lists': listsPanelOpen = !listsPanelOpen; renderRouteScreen(); break;
          case 'create-list': doCreateList(); break;
          case 'add-custom': doAddCustom(); break;
          case 'autosort': doAutosort(); break;
          case 'kml': doDownloadKML(); break;
          case 'gmaps': doOpenGmaps(); break;
          case 'export-json': doExportJSON(); break;
          case 'import-json': { const inp = $('#route-import-file'); if (inp) inp.click(); break; }
          case 'import-merge': doImport('merge'); break;
          case 'import-replace': doImport('replace'); break;
          case 'import-cancel': importPending = null; renderRouteScreen(); break;
        }
      }

      // ---- Оверлей: открытие/закрытие -----------------------------------

      function isOverlayOpen() {
        const ov = $('#route-overlay');
        return !!ov && !ov.hidden;
      }

      function setOverlay(show) {
        const ov = $('#route-overlay');
        if (!ov) return;
        if (show) {
          listsPanelOpen = false;
          renderRouteScreen();
          ov.hidden = false;
          ov.setAttribute('aria-hidden', 'false');
          document.body.classList.add('no-scroll');
          const sc = $('#route-scroll');
          if (sc) sc.scrollTop = 0;
        } else {
          ov.hidden = true;
          ov.setAttribute('aria-hidden', 'true');
          document.body.classList.remove('no-scroll');
          hideToast();
        }
      }

      function closeOverlay() {
        if (location.hash === '#route') history.back();
        else setOverlay(false);
      }

      function onOverlayClick(e) {
        if (e.target.closest('#route-close')) { closeOverlay(); return; }

        const del = e.target.closest('[data-route-del]');
        if (del) { deletePlaceFromActive(del.getAttribute('data-route-del')); return; }

        const sel = e.target.closest('[data-route-select]');
        if (sel) {
          RouteStore.setActive(sel.getAttribute('data-route-select'));
          listsPanelOpen = false;
          refreshAll();
          return;
        }

        const ren = e.target.closest('[data-route-rename]');
        if (ren) { doRenameList(ren.getAttribute('data-route-rename')); return; }

        const dup = e.target.closest('[data-route-dup]');
        if (dup) {
          RouteStore.duplicateList(dup.getAttribute('data-route-dup'));
          refreshAll();
          return;
        }

        const delList = e.target.closest('[data-route-delete-list]');
        if (delList) { doDeleteList(delList.getAttribute('data-route-delete-list')); return; }

        const act = e.target.closest('[data-route-action]');
        if (act) { onRouteAction(act.getAttribute('data-route-action')); return; }
        // Клик по ссылке точки (#place-…) — обрабатывается браузером,
        // hashchange закроет оверлей и прокрутит к карточке.
      }

      // ---- Этап 2: drag-сортировка и свайп-удаление ---------------------
      // Десктоп: перетаскивание строк нативным HTML5 drag-and-drop.
      // Тач: long-press → drag-режим; горизонтальный свайп влево → удаление.
      // Разведение жестов — по направлению первого движения пальца.

      const LONG_PRESS_MS = 350;
      const DIR_SLOP = 8;             // px, порог распознавания направления
      const SWIPE_DELETE_RATIO = 0.4; // доля ширины строки для удаления

      let dndRow = null;        // строка, которую тащим мышью
      let touchGesture = null;  // активный touch-жест

      // Пересчёт номеров и дистанций по текущему DOM-порядку строк —
      // на лету, без записи в RouteStore.
      function recomputeRowsUI() {
        const list = $('#route-list');
        if (!list) return;
        list.querySelectorAll('.route-dist').forEach(d => d.remove());
        const rows = Array.prototype.slice.call(list.querySelectorAll('.route-row'));
        rows.forEach((row, i) => {
          const num = row.querySelector('.route-num');
          if (num) num.textContent = (i + 1);
          if (i > 0) {
            const prev = placeById[rows[i - 1].getAttribute('data-place-id')];
            const cur = placeById[row.getAttribute('data-place-id')];
            if (prev && cur && prev.coords && cur.coords) {
              const dist = document.createElement('div');
              dist.className = 'route-dist';
              dist.textContent = formatDist(haversine(prev.coords, cur.coords));
              list.insertBefore(dist, row);
            }
          }
        });
        const totalsEl = $('#route-totals');
        if (totalsEl) {
          const places = rows
            .map(r => placeById[r.getAttribute('data-place-id')])
            .filter(p => p && p.coords);
          totalsEl.textContent = 'Итого: ' + places.length + ' ' +
            plural(places.length, ['точка', 'точки', 'точек']) + ' · ' +
            formatDist(totalDistance(places)) + ' по прямой';
        }
      }

      // Фиксация нового порядка из DOM в RouteStore (полный ре-рендер).
      function commitOrderFromDOM() {
        const list = $('#route-list');
        if (!list) return;
        // Дедуп по id на случай гонки жестов — порядок не должен плодить дубли.
        const ids = [];
        const seen = {};
        Array.prototype.slice.call(list.querySelectorAll('.route-row')).forEach(r => {
          const id = r.getAttribute('data-place-id');
          if (id && !seen[id]) { seen[id] = true; ids.push(id); }
        });
        RouteStore.setActiveOrder(ids);
        refreshAll();
      }

      // Подавляет ближайший click — чтобы свайп/drag по строке
      // не сработал как переход по ссылке точки.
      function suppressNextClick() {
        const handler = ev => {
          ev.stopPropagation();
          ev.preventDefault();
          document.removeEventListener('click', handler, true);
        };
        document.addEventListener('click', handler, true);
        setTimeout(() => document.removeEventListener('click', handler, true), 400);
      }

      // --- Десктоп: HTML5 drag-and-drop ---

      function onDragStart(e) {
        // На тач-устройствах long-press по draggable-строке запускает НАТИВНЫЙ DnD
        // параллельно с нашим тач-жестом — две системы переупорядочивания
        // конфликтуют и дублируют строку. Если идёт тач-жест — гасим нативный DnD.
        if (touchGesture) { e.preventDefault(); return; }
        const row = e.target.closest('.route-row');
        if (!row || !row.parentNode || row.parentNode.id !== 'route-list') return;
        dndRow = row;
        row.classList.add('dragging');
        if (e.dataTransfer) {
          e.dataTransfer.effectAllowed = 'move';
          try { e.dataTransfer.setData('text/plain', row.getAttribute('data-place-id')); }
          catch (_) { /* noop */ }
        }
      }

      function onDragOver(e) {
        if (!dndRow) return;
        e.preventDefault();
        if (e.dataTransfer) e.dataTransfer.dropEffect = 'move';
        const list = $('#route-list');
        const over = e.target.closest('.route-row');
        if (!list || !over || over === dndRow || over.parentNode !== list) return;
        const rect = over.getBoundingClientRect();
        const after = (e.clientY - rect.top) > rect.height / 2;
        const before = after ? over.nextElementSibling : over;
        if (before === dndRow) return; // уже на месте
        list.insertBefore(dndRow, before);
        recomputeRowsUI();
      }

      function onDragEnd() {
        if (!dndRow) return;
        dndRow.classList.remove('dragging');
        dndRow = null;
        commitOrderFromDOM();
      }

      // --- Тач: long-press drag + свайп-удаление ---

      function onTouchStart(e) {
        if (touchGesture || e.touches.length > 1) return;
        const row = e.target.closest('.route-row');
        if (!row || !row.parentNode || row.parentNode.id !== 'route-list') return;
        // Тап по × или 📋 — обычный клик, не начинаем свайп/драг.
        if (e.target.closest('.route-row-del') || e.target.closest('.route-row-copy')) return;
        const t = e.touches[0];
        touchGesture = {
          row: row,
          surface: row.querySelector('.route-row-surface'),
          startX: t.clientX,
          startY: t.clientY,
          mode: '',          // '' | 'swipe' | 'drag' | 'scroll'
          swipeX: 0,
          longTimer: setTimeout(beginTouchDrag, LONG_PRESS_MS),
        };
      }

      function beginTouchDrag() {
        if (!touchGesture || touchGesture.mode) return;
        touchGesture.mode = 'drag';
        touchGesture.row.classList.add('dragging');
      }

      function onTouchMove(e) {
        if (!touchGesture) return;
        const t = e.touches[0];
        if (!t) return;
        const dx = t.clientX - touchGesture.startX;
        const dy = t.clientY - touchGesture.startY;

        // Распознаём направление по первому заметному движению.
        if (!touchGesture.mode) {
          if (Math.abs(dx) > DIR_SLOP && Math.abs(dx) > Math.abs(dy)) {
            touchGesture.mode = 'swipe';
            clearTimeout(touchGesture.longTimer);
            touchGesture.surface.classList.add('swiping');
          } else if (Math.abs(dy) > DIR_SLOP) {
            touchGesture.mode = 'scroll'; // вертикаль до long-press — обычный скролл
            clearTimeout(touchGesture.longTimer);
          } else {
            return; // палец почти не двигался — ждём long-press
          }
        }

        if (touchGesture.mode === 'swipe') {
          e.preventDefault();
          touchGesture.swipeX = Math.min(0, dx); // только влево
          touchGesture.surface.style.transform =
            'translateX(' + touchGesture.swipeX + 'px)';
        } else if (touchGesture.mode === 'drag') {
          e.preventDefault();
          moveTouchDrag(t.clientX, t.clientY);
        }
        // mode 'scroll' — ничего не делаем, нативная прокрутка
      }

      function moveTouchDrag(x, y) {
        const list = $('#route-list');
        if (!list) return;
        const row = touchGesture.row;
        const el = document.elementFromPoint(x, y);
        const over = el && el.closest('.route-row');
        if (over && over !== row && over.parentNode === list) {
          const rect = over.getBoundingClientRect();
          const after = y > rect.top + rect.height / 2;
          const before = after ? over.nextElementSibling : over;
          if (before !== row) {
            list.insertBefore(row, before);
            recomputeRowsUI();
          }
        }
        // авто-прокрутка у краёв экрана
        const sc = $('#route-scroll');
        if (sc) {
          const r = sc.getBoundingClientRect();
          if (y < r.top + 64) sc.scrollTop -= 10;
          else if (y > r.bottom - 64) sc.scrollTop += 10;
        }
      }

      function onTouchEnd() {
        if (!touchGesture) return;
        clearTimeout(touchGesture.longTimer);
        const g = touchGesture;
        touchGesture = null;

        if (g.mode === 'swipe') {
          g.surface.classList.remove('swiping'); // вернёт CSS-transition
          const width = g.row.getBoundingClientRect().width || 1;
          if (Math.abs(g.swipeX) >= width * SWIPE_DELETE_RATIO) {
            g.surface.style.transform = 'translateX(-100%)';
            const placeId = g.row.getAttribute('data-place-id');
            suppressNextClick();
            setTimeout(() => deletePlaceFromActive(placeId), 180);
          } else {
            g.surface.style.transform = 'translateX(0)';
            suppressNextClick();
          }
        } else if (g.mode === 'drag') {
          g.row.classList.remove('dragging');
          suppressNextClick();
          commitOrderFromDOM();
        }
      }

      function onTouchCancel() {
        if (!touchGesture) return;
        clearTimeout(touchGesture.longTimer);
        const g = touchGesture;
        touchGesture = null;
        if (g.mode === 'swipe') {
          g.surface.classList.remove('swiping');
          g.surface.style.transform = 'translateX(0)';
        } else if (g.mode === 'drag') {
          g.row.classList.remove('dragging');
          commitOrderFromDOM();
        }
      }

      function setupRoute() {
        const overlay = $('#route-overlay');
        if (!overlay) return;

        // Открытие — нативной ссылкой «Маршрут» в топбаре (href="#route") через hashchange.
        overlay.addEventListener('click', onOverlayClick);

        window.addEventListener('hashchange', () => {
          setOverlay(location.hash === '#route');
        });

        document.addEventListener('keydown', e => {
          if (e.key === 'Escape' && isOverlayOpen()) closeOverlay();
        });

        // Кнопки «В маршрут» на карточках каталога.
        document.addEventListener('click', e => {
          const addBtn = e.target.closest('[data-route-add]');
          if (addBtn && !addBtn.disabled) {
            RouteStore.togglePlace(addBtn.getAttribute('data-route-add'));
            refreshAll();
          }
        });

        const importInput = $('#route-import-file');
        if (importInput) importInput.addEventListener('change', onImportFile);

        const undoBtn = $('#route-toast-undo');
        if (undoBtn) {
          undoBtn.addEventListener('click', () => {
            if (toastUndo) { const fn = toastUndo; toastUndo = null; fn(); }
            hideToast();
          });
        }

        // Этап 2: жесты переупорядочивания и удаления (делегирование на оверлей).
        overlay.addEventListener('dragstart', onDragStart);
        overlay.addEventListener('dragover', onDragOver);
        overlay.addEventListener('drop', e => e.preventDefault());
        overlay.addEventListener('dragend', onDragEnd);
        overlay.addEventListener('touchstart', onTouchStart, { passive: true });
        overlay.addEventListener('touchmove', onTouchMove, { passive: false });
        overlay.addEventListener('touchend', onTouchEnd);
        overlay.addEventListener('touchcancel', onTouchCancel);

        updateRouteCount();
        refreshAddButtons();
        if (location.hash === '#route') setOverlay(true);
      }

      // -------------------------------------------------------------------
      // Bootstrap
      // -------------------------------------------------------------------

      // Переключатель темы: авто → светлая → тёмная (хранится в localStorage).
      function setupTheme() {
        const btn = $('#theme-toggle');
        if (!btn) return;
        const order = ['auto', 'light', 'dark'];
        const icon = { auto: '🌓', light: '☀️', dark: '🌙' };
        const title = { auto: 'Тема: авто', light: 'Тема: светлая', dark: 'Тема: тёмная' };
        const current = () => {
          const a = document.documentElement.getAttribute('data-theme');
          return (a === 'dark' || a === 'light') ? a : 'auto';
        };
        // Цвета хрома браузера (статусбар/таб) под фон топбара — те же, что в media-meta.
        const themeColor = { light: '#fffaef', dark: '#2a2c30' };
        // Синк <meta name="theme-color"> с эффективной темой.
        //  • auto  — возвращаем media-зависимые значения (систему слушает сам браузер);
        //  • ручной — перебиваем систему: ставим обеим meta один цвет.
        const syncThemeColor = mode => {
          document.querySelectorAll('meta[name="theme-color"]').forEach(m => {
            if (mode === 'auto') {
              const mq = m.getAttribute('media') || '';
              m.setAttribute('content', mq.includes('dark') ? themeColor.dark : themeColor.light);
            } else {
              m.setAttribute('content', themeColor[mode]);
            }
          });
        };
        const apply = mode => {
          if (mode === 'auto') document.documentElement.removeAttribute('data-theme');
          else document.documentElement.setAttribute('data-theme', mode);
          try { localStorage.setItem('trip-theme', mode); } catch (e) {}
          syncThemeColor(mode);
          btn.textContent = icon[mode];
          btn.title = title[mode];
          btn.setAttribute('aria-label', title[mode]);
        };
        apply(current());
        btn.addEventListener('click', () => {
          apply(order[(order.indexOf(current()) + 1) % order.length]);
        });
      }

      function init() {
        try {
          renderCatalog();
          buildFilterChips();
          setupAnchor();
          applyFilters();
          setupSearch();
          setupCopyButtons();
          setupRoute();
          setupTheme();
          const bd = document.getElementById('build-date');
          if (bd && typeof BUILD_DATE !== 'undefined') bd.textContent = BUILD_DATE;
        } catch (err) {
          console.error('Guide init failed', err);
          const el = document.createElement('pre');
          el.style.cssText = 'background:#fee;color:#c00;padding:12px;border:1px solid #c00;margin:12px;';
          el.textContent = 'Ошибка инициализации гайда:\n' + (err && err.stack || err);
          document.body.insertBefore(el, document.body.firstChild);
        }
      }

      if (document.readyState === 'loading') {
        document.addEventListener('DOMContentLoaded', init);
      } else {
        init();
      }
    })();

</script>

</body>
</html>
